子以為漢陰丈人説苑以為五丈夫化不孝子仇覽傳以為蒲亭長於陳元謝丞書以為陽遂亭長於羊元桃梗語土偶戰國䇿以為蘇秦於李兊史記以為蘇代於孟嘗君殺鄧析者左傳以為駟歂荀子劉向並以為子産不入勝母之里尸子以為孔子淮南子鹽鐵論並以為曽子齒剛舌柔説苑以為常摐告老子孔叢子以為老萊子告子思烹彘教子韓非以為曽子韓嬰以為孟母射石没羽新序以為熊渠吕覽論衡並以為養由基漢書西京雜記並以為李廣獻不死之藥戰國䇿以為荆王類説以為燕王漢武内傳以為武帝獻空籠而無鵠國事以為蔡無澤世説以為淳于髠依王生之言以對君得拜水衡都尉漢書以為宣帝於渤海太守史記楮先生以為武帝於北海太守三年不蜚不鳴之語史記楚世家以為伍舉説莊王而滑稽傳又以為淳于髠説齊威王客為雞鳴渡秦關有孟嘗君而又有燕太子丹雪中髙卧有袁安而又有胡定感虎渡水有𢎞農太守劉昆而又有九江太守宋均投筆封侯有班超而又有傅介子輿疾入殿有司徒傅祗而又有太傅王導伏棺止火有汝南蔡君仲而又有長沙古初決爭牛之訟有顧憲之宋書而又有于仲文後魏書㸔竹有王猷而又有袁粲啖灸有顧榮而又有何遜折梅遣使有陸凱而又有諸發躬導母輿有潘岳而又有崔邠妻勸隠居有陸通而又有老萊子圍棋却賊有費禕而又有謝安居官留犢有魏之時苗而又有晉之羊篇帛書傳鴈有漢之蘇武而又有元之郝伯常見元史並宋濂文集前席顧問有商鞅秦孝公時賈誼漢文帝時而又有蘇綽周文帝時噀酒救火有欒巴樊英而又有郭憲佛圖澄倒用印者有段秀實而又有李崧作非非國語者有江端禮見王應麟紀聞而又有虞槃見元史列傳食飯知勞薪所炊者晉平公時有師曠見隋書王邵傳而晉武帝時又有荀朂見朂本傳非百里才者魯肅稱龎統而諸葛亮又稱蔣琬居官給雞卵于部民收雛侔利者有呉興守謝朏宋書孝武時而又有益州新昌令夏侯彪出朝野僉載母嚙指而心痛者有曽參而又有蔡順撲鏡於地者有夏侯惇而又有張祐獻胙加毒以讒賜死者有晉獻公子申生而又有秦孝文王子西蜀侯惲沈江負父屍有孝女曹娥而又有趙祉女絡佩六印有蘇秦而又有欒大御屏隔坐有漢之鄭𢎞第五倫而又有呉之紀亮紀隲食脱粟飯有晏嬰而又有公孫𢎞作錢神論有魯褒而又有胡母民成公綏羊車遊後宫鹽水洒地有晉武帝而又有宋文帝錦纜牽舟有甘寧而又有隋煬帝獲偷侍兒人試文不殺因以賜之有楊素於李伯藥而又有蔡興宗於孫敬玉强索人妾有孫秀阮佃夫而又有武承嗣告靈不仕有王羲之而又有何偃弈棋覆局有王粲而又有到溉製千字文有周興嗣而又有蕭子範贈柳妾有韓珝而又有李還古誤食澡豆有王敦而又有陸暢殺負心僕有張詠而又有柳開金蓮歸第有王珪而又有蘇軾知鳴者有介葛盧左傳而又有詹何韓非子知馬鳴者有翁偉論衡而又有李南抱朴子知雀鳴者有楊宣益部耆舊傳而又有成子桂陽先賢畫讃知鵲鳴者有管輅魏志而又有張子信齊書孫守榮宋史長頸烏喙者有夏禹而又有越勾踐目視日不眩者晉有王戎隋有劉炫而宋又有蔡京目重瞳者有虞舜項羽而又有隋之魚俱羅南唐李煜猿臂者有后羿而又有李廣郭知運號水鏡者有司馬德操而又有樂廣柳莊號智囊者有樗里子晁錯而又有魯匡桓範杜預號鳳毛者有謝鳳之子超宗而又有王導之子劭號聖童者有張堪而又有任延號孝童者有王方翼而又有段秀實號奇童者有潘岳楊愔李百藥而又有柳宗元楊烱李泌號千里駒者有劉德曹休傅咸劉曜符朗顧和張敷蕭暎王規劉香王茂任昉而又有丘仲孚袁昂李彦伯袁曜馮翊王潤崔昂元文遙杜杲張乾威李暠號萬石者五石奮嚴延年馮楊秦襲張文瓘號七貴者三漢西京七族史霍上官王趙丁傳也時稱外戚七貴又隋有牛𢎞蘇威宇文述張瑾裴藴虞世基裴矩時稱選曹七貴號三少者四晉阮裕稱王羲之王應王悦為王氏三少唐李嗣真劉獻臣孫昭皆少有名時號三少北齊李師盧公順崔君洽亦號三少又石􅐂石憑石悠兄弟號橘林三少號三君者二韋順韋豹韋義陳寔陳紀陳諶號八達者三魏諸葛誕等號八達又晉畢卓等號八達又司馬懿兄弟八人俱以達為字號八達號八俊八顧八及者各有二見後漢黨錮傳張安世金日磾皆七世珥貂後漢應順應疊應郴應奉應劭應瑒應亨晉王導王洽王珣王曇首王僧䖍王揖王筠並七世通顯漢劉岱劉繇許靖許䖍皆號二龍而唐之烏承玭烏承恩南唐徐鉉徐鍇亦號二龍李氏兄弟亮叔訓秀號四龍而房氏兄弟豫垣邃熙亦號四龍汝南先賢傳周氏五子子輿子羽子仲子明子良號五龍而公沙穆五子紹孚恪逵樊張裕五子演鏡永辯岱辛氏五子攀鑒曠寳迅以及燕山竇氏五子皆號五龍又異姓號五龍者汜昭戴祁徐晏夏隠劉彬而索靖汜衷張甝索紒索永亦號五龍卞粹兄弟六人並登宰輔世號六龍而温恭兄弟六人並知名亦號六龍陸微兄弟七人號七龍而崔徵兄弟七人亦號七龍荀淑子八人號八龍比之髙陽八才子而崔琯兄弟八人亦比荀氏八龍又賀德仁兄弟劉知幾兄弟伏羲兄弟各八人皆號八龍後魏崔樞兄弟九人皆長瑜子也號九龍而北齊王昕同母兄弟九人皆醖藉亦號九龍賈彪兄弟三人號三虎而陸曄兄弟三人並有才名亦號三虎北齊崔㥄弟仲文號二鳳而隋之魏景義魏景禮亦號二鳳五世盛德者二王昶子湛湛子承承子述述子坦之乂杜畿子恕恕子預預子錫錫子乂四世掌誥者二胡宿胡宗愈胡交脩胡世將張嘉貞張延賞張𢎞靖張次宗三世掌誥者五李德林李百藥李安期徐齊𥅆徐堅徐嶠孫逖孫宿孫簡張説張均張濛李昉李諤李昭述三世典選者二謝莊謝㵸謝覽劉林甫劉祥道劉齊賢三世同官者八周訪子撫撫子楚並為益州牧梁顥子適適子美並為京兆尹王儉子暕暕子承並為國子師趙才子道興道興子皎並為執金吾孔穎達孔志孔惠元並為司業吕蒙正吕夷簡吕公著並為司空韋仁約韋濟韋𢎞景並為左丞薛琮薛榮薛兼並傅東宫父子宰相者四周勃子亞夫韋賢子𤣥成平當子晏蘇瓌子頲父子三人入相者二韋仁約子承慶嗣立鄭珣瑜子覃朗父子狀元者三安德裕子守亮張去華子師德梁顥子固兄弟狀元者二孫何孫僅宋郊宋祁兄弟列㦸者三張儉張文張巡李峴李峘李嶧崔琳崔珪崔瑤門皆列㦸時號三㦸稱李杜者四漢李固杜喬李雲杜衆李膺杜密唐李白杜甫稱蘇李者三漢蘇武李陵唐蘇味道李嶠蘇頲李乂漢馮野王字君卿弟立字聖卿相代為上郡太守民歌大馮君小馮君時稱二馮而唐之馮宿馮定亦稱二馮漢蘇章蘇不韋稱二蘇而南齊蘇湛蘇綽宋蘇軾蘇轍皆稱二蘇劉氏兄弟齊名世稱二劉隋有劉焯劉炫唐有劉懿之劉禕之又劉夙劉朔宋有劉敞劉攽又劉靖之劉清之又劉爚劉炳稱二呉者呉坦之呉隠之載於世説而呉通微呉通𤣥兄弟並為學士又呉育呉充並有才名皆稱二呉楚人龔勝龔舍並著名節史記作兩龔傳而龔夬龔大壯亦稱兩龔見玉海小學紺珠晉王戎王衍清談時人語曰二王當國羊公無德而羲之獻之書法亦稱二王又梁時王銓王錫亦稱二王謂之玉昆金友孫謙孫廉號東莞二孫而孫何孫僅亦稱二孫陸機陸雲稱二陸而陳時陸瑜陸琰後魏陸暐陸恭之俱稱二陸稱三王者唐王璵王珣王瑨宋王安石安國安禮又王回王向王冏稱三范者范純仁純禮純粹而范鎮子百祿百祿子祖禹亦稱三范范祖禹詩玉堂三世見題名是也稱三張者張嘉貞延賞𢎞靖三世宰相時號三相張家而張廷珪張齡張休前後牧洪州號洪州三張又晉之張載字孟陽張協字景陽張元字季陽時人語曰二陸入洛三張減價稱三薛者河東薛收薛德音薛元敬而薛琮薛榮薛兼亦稱三薛宋有五竇端明學士儀禮部侍郎儼起居郎侃參知政事偁補闕僖此五人皆諫議大夫禹鈞之子唐亦有五竇國子祭酒常司業牟容管經略羣㜈州刺史庠武昌節度使鞏此五人皆左拾遺叔向之子呉人自稱曰儂陳后主喜稱儂隋煬帝亦自稱儂曹操稱瞞唐明皇亦自稱阿瞞唐書懿宗時諸道進白者白者二字他書未見盖唐時閹人之稱即今所謂浄身人也古人有離合文字隠郡國姓名者如孔北海四言一篇云漁父屈節水潜匿方離魚字與時進止出寺施張離日字魚日合魯呂公饑釣闔口渭旁離口字九域有聖無土不王離或字口或合國好是正直女固子臧離子字海外有截隼逝鷹揚離乙字子乙合孔六翮不奮羽儀未彰離鬲字龍蛇之蟄比它可忘離虫字鬲虫合融玟璇隠耀美玉韜光玫去玉成文字無名無譽放言深藏離與字按轡安行誰謂路長離手字與手合舉此乃魯國孔融文舉六字也出寺施張一作出行施張饑釣一作釣磯女固子臧一作女回子匡海外一作海内不奮一作將奮比它一作俾也又參同契後序云鄶國鄙夫幽谷朽生委時去害依託丘山循遊寥廓與鬼為鄰百世一下遨逰人間湯遭厄際水旱隔併此乃㑹稽魏伯陽五字也又越絶書巻末云記陳厥説畧其有人以去為姓得衣乃成厥名有米覆之以庚此乃袁康二字也又云文屬辭定自於邦賢以口為姓丞之以天楚相屈原與之同名此乃呉平二字也即如漢時董卓將亡童謠云千里草何青青十日卜不得生千里草董字十日卜卓字也晉時王恭將叛童謠云黄頭小人欲作亂頼得金刀作蕃捍黄頭小人恭字也秦苻堅為姚萇所殺童謠云魚羊田斗當㓕秦魚羊鮮字田斗卑字姚萇鮮卑種也周宣帝自稱天元皇帝禁人有天髙上大之稱改髙姓為姜九族髙祖為長祖宋政和中禁人以龍天君王帝上聖皇玉主等為名字故毛友龍但名友句龍如淵稱句如淵葉天將但名將樂天作但名作方天仕改名大仕方天若改名元若衛上達賜名仲達葛君仲改名師仲周綱字君舉改字元舉俞聖求改名應求程瑀字伯玉改字伯禹宣和中詔罷前禁云洪武三年禁革小民毋以天國君臣聖神堯舜禹湯文武周漢晉唐宋等國號為名字正統十年進士登科錄凡天字皆作䒶云出内閣意景泰中幸太學謝表内閣自為之中有管窺霄蠡測海句盖亦避天字也時有識者詫其事正德初逆瑾擅政禁民不得用天等字為名如郎中方天雨但名雨參議倪天民但名民未幾瑾誅識者謂無天之罪已兆於此名疑卷三
