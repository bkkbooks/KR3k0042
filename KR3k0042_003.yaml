body:
  text: 名疑巻三明陳士元撰魯仲孫何忌春秋書仲忌公羊氏曰仲忌此何忌也譏二名非禮也注云難為諱一字為名難言而易諱所以長臣子之敬也古人命字惟取一言無以兩言相兼取義者檀弓云幼名冠字五十以伯仲周道也初稱子既而稱伯仲叔季老而尊者稱甫孔子字仲尼以孟皮為伯也不稱伯而稱孟妾生長子稱孟不得稱伯也孔子弟子曽㸃字晳史記㸃作蒧顔無繇字路任不齊字選秦冉字開公夏首字乗顔祖字襄申黨字周顔之僕字叔左人郢字行燕伋字思原亢字籍原憲字思㢘潔字庸顔何字冉家語冉作稱狄黑字晳皆以一言為字其他字伯牛仲弓叔魚季路季次之外惟稱子而已非有二義也屈原字平楚詞云名余曰正則兮字余曰靈均盖以正則釋原義靈均釋平義敷演辭章爾都穆聽雨紀談云正則靈均盖原之小名小字也史記漢髙祖父太公母媪正韻媪烏皓切音襖張晏云媪老母稱也皇甫謐王符等云太公名執嘉一云名燸字執嘉燸一作嬬音湍一作耑一作煴見餘冬序錄一云媪姓也王氏小司馬索隠云母煴氏世紀云昭靈太后名含始路史注云執嘉妻含始生劉季恐皆杜撰不然太史公生世甚近何以不云爾也漢太公四子伯仲邦交故髙祖字季何孟春云髙祖兄仲名喜是伯仲叔季字也但不知伯之名耳漢帝名字取義淺顯惠帝盈字滿文帝恒字常景帝啓字開武帝徹字通昭帝弗陵字不應宣帝詢字謀又字次卿一云次卿小字也元帝奭字盛成帝驁字俊小字太孫哀帝欣字喜平帝衎字樂光武秀字茂一字文叔明帝莊字嚴章帝烜字著和帝肇字始安帝祐字福順帝保字守桓帝志字意靈帝宏字大獻帝協字合帝王紀云字伯和呂后名雉荀悦云字野雞顔師古云字娥姁武帝邢夫人號娙娥又號娙何方言云娙好也外戚傳云娙娥武帝所制姬妾爵位視中二千石比關内侯蕭何封鄼侯長子祿嗣孝惠六年薨無後髙后二年封何夫人祿母同為侯同夫人姓或云名也夫人封侯始見此昔春秋齊侯以石窌與辟司徒之妻漢髙祖以延鄉與翟母皆其食邑未有實封侯者西漢近古班固漢書列傳無字者多其以一言為字者如陳勝字涉項籍字羽胡建眭𢎞俱字孟彭越蕭咸俱字仲張歐呉廣枚乗俱字叔張釋之公孫𢎞俱字季髙祖同字楚元王交朱雲俱字㳺爰盎字絲周章字文鄭當時字莊是也其他如子房張良子卿蘇武子孟霍光子政劉向子孺張安世子長司馬遷李尋子髙張敞子嚴孫寳子㢘何並子明馮奉世子雲終軍谷永揚雄子真梅福辛慶忌子公陳湯田廣明子襄丁寛子仲王同子陽王吉歐陽髙子賔田延年子幼楊軍子威王商翟方進子駿劉歆子微息夫躬子都鮑宣趙廣漢胡母生子况尹翁歸子元房鳯仲卿衞青王章朱邑長卿司馬相如施讐薛廣德少卿田叔周堪龔遂李陵丙吉劉辟疆君卿馮野王樓護㳺卿馬宫穉卿鄭𢎞次卿鄭昌嚴延年翁卿召信臣聖卿董賢長君路温舒少君翼奉竇廣德幼君周慶次君戴聖贛君薛宣近君后蒼延君戴德曼君申章王孫馮遂竇嬰榮廣馮嫣翁孫趙充國公孫顔安樂次公盖寛饒黄霸少公蔡千秋幼公杜延年陳萬年仲公師丹長公張摯夏侯勝韓延壽君公何武翁叔金日磾子叔公孫賀長倩蕭望之曼倩東方朔于定國雋不疑次倩江充長孺汲黯韓安國韋賢杜周仲孺灌夫少孺貢禹韋𤣥成子孺淳于長長翁梁丘賀費直弱翁魏相仲翁䟽廣君房賈捐之母將隆君賔龔勝君倩龔舍君况甘延壽君孟五鹿充宗君仲史丹稚圭匡衡稚㳺傳喜巨先原涉巨君王莽長賔衡咸林尊張山拊長子陳遂長房石顯之類惟從一訓非有二義東漢以後則不盡然漢人名字有同前人字諡者如魯恭字仲康伏恭字叔齊翟宣字太伯張禹張敏俱字伯達竇融字周公袁安何林俱字邵公張步字文公慶普丁鴻俱字孝公伏湛字惠公陳重字景公劉昆字桓公耿䕫字定公陳寵字昭公趙憙字伯陽憙一作嘉衞宏蔡倫俱字敬仲戴封劉順俱字平仲翟義字文仲傅毅字武仲馮逡衛颯唐檀俱字子産寒朗樂恢俱字伯奇應奉字世叔何熙淳于恭俱字孟孫郭躬字仲孫賈逵种暠俱字景伯鄧彪字智伯其與孔門弟子同字者如陳寔字仲弓鄭崇字子㳺馬武許荆俱字子張王尊吾丘壽王俱字子貢杜欽杜鄴彭祖孔光萭章萭音拒俱字子夏第五倫字伯魚堅鐔字子伋傅爕字南容宋義號卿子冠軍卿一作慶黥布姓英倪寛一作兒寛泠褒一作廖褒酷吏傳寧成一作寗成殷中一作假中減宣一作咸宣儒林傳殷中一作叚一作瑕功臣表陳武一作柴武相如傳蘭忌嚴助傳作間忌袁盎傳掊生一作服生蕳掊俱姓袁盎一作爰盎史記髙祖紀周蘭一作周簡項籍紀赤泉侯楊喜漢表作楊憙灌嬰傳肥誅漢書作肥銖郭解傳鹵公孺漢書作魯公孺淮南王傳莊芷漢書作嚴正漢書列傳膠東王熊渠長沙頃王鮒鮈諸王侯表熊渠作雄渠鮒鮈作附朐前漢蒯徹漢書徹作通避武帝諱後漢朱祐呉祐東觀記作朱福續漢書作呉佑避安帝諱史記張耳傳未言為南宫侯而楚漢春秋有南宫侯張耳按漢書異姓諸王侯表張耳歸漢立為趙王耳子敖廢為侯敖子偃封於魯文帝時改封南宫侯楚漢春秋誤稱耳也史記貨殖傳桓廢雍伯漢書桓作稽雍作翁史記梁懷王勝梁平王襄漢書勝作揖襄作讓史記汲黯傳劉棄漢書作劉棄疾史記佞幸傳髙祖時有籍孺孝惠時有閎孺而朱建傳乃云孝惠幸臣閎籍孺誤書也項伯名纒字伯髙祖賜姓劉漢書功臣表射陽侯劉纒師古注云即項伯也索隠云項纒字伯陵呂后父呂公善相人相經云呂公名文字叔平楚漢春秋叔孫通名何字通史記張良世家及項籍本紀俱云鯫生説我注云鯫淺也小魚也或云鯫姓也楚漢春秋作解先生索隠云鯫生即解生張良父平祖開地良本韓之公族姬姓以秦捕急更姓張法言云甘羅之悟呂不韋張辟彊之覺平勃皆以十二齡羅茂孫辟彊良子也四皓者一曰園公二曰綺里季三曰夏黄公四曰角里先生此漢惠帝時所刻四皓神座也園公陳留風俗傳作圏公或云園公名庾字宣明襄邑人也始居園中因以為號或云姓國名秉或云姓唐或云姓庚師古亦作圏公或云圏公姓韋而漢書法言俱作園公仙傳拾遺又作東園公綺里季綺里姓季名或云季字也或云姓呉名實字子景或云姓朱名暉字文季畢文簡公士安以綺里季夏為一人黄公為一人盖以逸少淵明子美有黄綺之語耳仙傳拾遺云綺里季東園公角里先生夏黄公與張良為雲霞之友與惠帝所刻神座同則文簡之説未是夏黄公一曰夏里黄公姓崔名廓字少通廓一作廣齊人也隠居夏里因以為號四明志又云黄公鄞人角里先生軹人也孔安國秘紀及漢紀仙傳俱作角蠡而魏子又作祿里或云泰伯之後姓周名術字元道又稱灞上先生角里亦其號耳元和姓纂有綺里夏里祿里三姓盖其後裔顔師古漢書注云四皓匿迹逺害氏族無得而詳皆後世皇甫謐之徒所附㑹耳角音鹿上從兩㸃下從用漢書作甪上從一撇海錄碎事云應曜隠居淮上與四皓同徵而不出曜一作耀又徐伯珍兄弟四人白首相對時人亦呼為四皓漢書功臣表留侯張良以韓申都下韓師古注云韓申都即韓王信也楚漢春秋作信都古文信申通用劉攽云韓申都即韓申徒也張良傳云以韓司徒下韓數城史記作申徒申徒者司徒之聲轉也申都者又申徒之聲轉也國名紀云申徒申屠信都勝屠勝都本出一姓良下韓時乃韓王成非韓王信師古注誤曹參字敬伯見張華博物志蜀郡太守文翁名黨字仲翁見李石續博物志漢書師古等注不載宋祁撰文翁祠堂碑秪云文公名翁不知李石何考伏生名勝字子賤毛萇字子芝漢書俱不載字漢初有審食其酈食其趙食其三人以六國時衛有司馬食其並慕其為人故以為名蕭何孫係周苛孫平係一作傒一作嘉平一作應武帝紀亳人薄誘忌薄姓也一云薄字衍姓謬名忌誘字誤鄒陽傳莊忌夫子索隠云姓莊名忌字夫子漢書項羽烹韓生法言作蔡生封禪書申公武帝紀作申功漢武帝紀東郭咸陽㳺水發根東郭㳺水複姓咸陽發根名南越尉佗傳安國少季安國複姓少季名儒林傳闕門慶忌公户滿意闕門公户複姓慶忌滿意名户一作扈史記梁王世家有軒丘豹類犴反軒丘類犴複姓豹反名反一作友漢書作犴反無類字衛青傳煇渠侯鷹庇河綦侯禽棃常樂侯銅離煇渠一作順渠鷹庇一作雍庇又作篇訾禽棃一作鳥棃銅離一作稠離一作調離焦贛字延壽漢書京房傳云焦延壽字贛誤也焦一作譙楊士勛云京房本姓李董仲舒弟子呂步舒一作呂步荼古文舒荼同音如夏后舒公子舒或作荼詩云荆舒史記年表作荆荼酷吏傳麻戊一作麻成儒林傳申培公轅固生髙堂生胡母生歐陽生培一作陪轅一作袁髙堂生字伯胡母生字子都歐陽生字伯和曰公曰生皆其稱號儒林傳士孫張仲方從五鹿充宗受易師古注云士孫複姓名張字仲方又丁姓子孫從榮廣受穀梁春秋師古注云姓丁名姓字子孫又聞人通漢子方從后倉受禮如淳注云姓聞人名通漢字子方儒林傳毛莫如少路師古注云姓毛名莫如字子方風俗通毛作屯以為混屯之後又申章昌曼君李奇注云姓申章名昌字曼君風俗通申作由以為由余之後儒林傳趙子傳蔡誼授同郡食我子公按風俗通食我韓公子也見戰國䇿食音嗣食我子公為博士一作食子公無我字顔安樂傳䟽廣授琅瑘筦路師古注云筦即管字路為御史中丞按風俗通姓氏篇有管莞二姓注云莞蘇楚大夫見呂氏春秋漢有莞路為御史中丞又有管姓管仲見論語漢有管虢為西河太守是莞路之莞從艸管仲之管從竹二字不同宋祁筆記云艸下完音丸又音官按集韻莞草名也管筦樂器也然管叔之管本上聲而周禮管人之管從竹亦讀如平聲莞音是莞莞字異而音亦有同者莞即菅字而姓苑菅音奸是莞菅字同而音亦有異者漢書劉向初名更生江充初名齊谷永初名並崔寔字子真初名台字元始仇覽一名香劉陶一名偉荀爽一名諝桓曄一名巖東觀記巖作儼服䖍初名重又名祗劉珍一名寳字秋孫一作秘孫嚴光一名遵華佗一名旉韓康字伯休一云名恬休一云字恬休耿國字叔慮一作叔憲范冉一作范丹童恢一作僮种荀彧漢紀作荀郁宋果字仲乙許荆字少張謝承書乙作文少作子向長字子平後世多稱向平髙士傳又作尚平王烈字彦方魏志作彦考應劭字仲逺見漢書及應氏譜而謝承書及文士傳作仲援漢官儀又作仲瑗漢書楊由字哀侯哀當作衷楚元王世家髙祖巨嫂漢書作丘嫂應劭云丘姓也孟康云丘空也伯兄先亾空有嫂也一云丘即巨也大也謂長嫂也釋常談云長兄謂之元昆易云元者善之長也論語注云昆兄也非伯兄不得呼元昆余嘗謂巨嫂可對元昆淮陰舍人告韓信反史記表云欒説漢書表云樂説而楚漢春秋以為謝公史記項羽本紀黥布蒲將軍服䖍云英布起於蒲因稱蒲將軍韋昭云蒲姓也英布蒲將軍是二人淮南厲王傳大夫但張晏云大夫姓但名漢書陳平傳絳灌等讒平師古注云絳絳侯周勃灌灌嬰也而楚漢春秋以絳灌樊噲周勃灌嬰四人並稱是髙祖臣别有姓絳名灌者淮南夫蓼太子師古以夫蓼為太子外家之姓猶言栗太子史皇孫之類文穎以夫蓼為太子食邑非淮南王安養士數千髙材者八人號曰八公蘇非李尚左呉田由雷被伍被毛被晉昌也非一作飛尚一作向由一作申左呉雷被伍被三人見史記漢書又髙氏子畧謂八公中有大山小山諸人竊謂大山小山非姓名或即晉昌輩稱號又王逸楚辭序曰八公著作篇章或稱小山或稱大山其義猶詩有小雅大雅又漢書伍被傳有趙賢朱驕或云即八公之數然神仙傳又謂雷被伍被誣告淮南王安反天子使宗正持節治之王與八公仙去又云攜左呉王春傅生等五人至𤣥洲遣還君然則雷被伍被左呉皆非八公之數俗傳劉安為厠神按仙傳云安以雞犬升天天帝罰之使守天厠俗語本此衛青傳平陽侯曹壽師古以為曹參之後功臣侯表不載灌夫傳穎陰侯灌嬰時穎陰侯乃灌嬰之子名何誤書嬰呂侯所幸大謁者張卿或作張澤或作張釋卿字也或澤或釋其名史記荆燕世家作張子卿劉向傳張子僑或作子蟜又作子喬史記項羽本紀沛公與紀信走酈山漢書作紀通張晏云通紀信子晉灼云信被焚死不見有子司馬貞云通紀成子按功臣表襄平侯紀通父成則通非信子張説謬通子名相夫一名嘉史記孝文本紀中大夫令勉師古云令姓勉名孝昭本紀齊王廬􅏯錯傳謁者鄧公周仁傳御史大夫張叔歐漢書勉作免廬作閭鄧公作鄧先歐作毆漢書丙吉傳守丞誰如孟康注云姓誰名如文穎注云誰如人名也一作譙如言姓非漢書杜延年傳史樂成霍光傳作使樂成功臣表又作便樂成王莽傳徐鄉侯劉快王子侯表作劉炔趙充國傳猶非猶姓非名宣帝紀作酋非匡衡善説詩時人語曰無説詩匡鼎來三輔黄圖云鼎衡小名也漢書衡字稚圭史記匈奴傳郎中係雩淺漢書雩作虖索隠云係音計雋不疑傳有男子詐稱衛太子者本夏陽人姓成名方遂一云姓張名延年王吉傳谷口鄭子真三輔决錄云子真名樸或作朴韓王信傳有柴將軍鄧展以為柴奇應劭以為柴武晉灼又以為柴武之子此闕名可疑者漢書注解有臣瓉劉孝標以為于瓉酈道元以為薛瓉顔師古又以為傅瓉此闕姓可疑者漢書楊王孫臝葬西京雜記云楊貴字王孫三輔黄圗云史稱楊王孫不稱楊貴妃或以字行耳漢書壺關三老荀悦漢紀云令狐茂古有杜康善造酒魏武短歌行注云康字仲寧秦本紀有芊八子唐八子漢廣陵王傳有八子郭昭君芉唐郭俱姓八子妾媵之號芉八子秦昭王之母芉亡爾切唐八子秦孝文王之母郭八子漢廣陵厲王所幸善歌舞妾也荆軻傳有徐夫人漢郊祀志武帝時有丁夫人徐丁俱姓夫人名皆男子也徐夫人趙人燕太子丹嘗求其七首徐或作陳見史記徐廣注丁夫人越人陽都侯丁復之孫以方術詛匈奴者樂府房中曲注云漢髙帝時唐山夫人所作唐山姓或云邑名漢初不聞有此人或云秦宫女史知文者髙帝采其樂歌也吕后四年封女弟􅎐為臨光侯􅎐一作須樊噲婦又宣帝母王夫人名翁須亦取易歸妹以須之義漢書皇太后女弟司馬君力蘇林云女弟字君力為司馬婦漢書嚴延年女名羅敷一作羅紨又六國時有邯鄲秦氏女名羅敷嫁為千乗王仁妻作陌上桑詞見崔豹古今注史記封禪書武帝王夫人漢書王作李宣帝紀有淳于衍成帝紀有陳持弓廣川王傳有王昭平王地餘陽成昭信王成初陶望卿陶都崔脩成榮愛衡山王傳有徐來廣陵王傳有董訾胡生趙左君衛青傳有衛君孺衛子夫丙吉傳有胡組郭徵卿皆女人也淳于陽成複姓餘皆單姓衍初都愛來訾生組單名餘皆複名荀子閭娵子奢韋昭云閭娵梁王魏瞿之美女一作明娵楚辭七諫又以閭娵為醜惡子奢鄭之美人國風孟子作子都婦人以字稱者漢有少君阿少穆姜媛姜之類晉有憲英惠風絡秀道韞之類有名有字者如漢之曹世叔妻班彪女名昭一名姬字惠班陰瑜妻荀爽女名采字女荀董祀妻蔡邕女名琰字文姬晉之景懷夏侯皇后名徽字媛容武元楊皇后名豔字瑗芝武悼楊皇后名芷字季蘭竇滔妻蘇氏名蕙字若蘭劉聰妻劉氏名娥字麗華有以一言為字者如漢之袁隗妻馬融女字倫龎淯妻趙氏字娥晉之王渾妻鍾氏字琰杜有道妻嚴氏字憲皮京妻龍氏字憐皇后有諡起於東漢皆一字諡耳取帝諡冠其上以别之唐宋以後則否又按禮祖有功宗有德創業之君稱祖繼世有德者稱宗如夏少康商太戊武丁是已東漢以後世主槩以宗稱不復論德非古也漢有卓文君晉明穆庾皇后亦名文君漢有王昭君北齊武明婁皇后亦名昭君舜妃名娥皇南唐後主昭惠后周氏亦名娥皇博物志須卜居㳄云王昭君之女也昭君名嬙一作檣或云漢制嬪嬙婦人官名也須卜裔姓居㳄云三言名或云昭君女姓伊黙名居㳄云其壻姓須卜名當按匈奴傳昭君為復株絫若鞮單于妻生二女長女云為須卜居㳄小女為當于居㳄李奇注云居㳄匈奴女號猶漢言公主文穎注云須卜當于二姓皆匈奴貴族是昭君長女名云而須卜當于乃兩壻之姓耳傳又云匈奴用事大臣右骨都侯須卜當即昭君女伊黙居㳄云之壻也漢和親侯王歙展德侯王颯皆昭君兄子莽遣二人使匈奴封須卜當為後安公又按古樂府有明君行即昭君也避晉文帝諱樂府原云王昭君齊國王穰女年十七入元帝後宫積五六年遣嫁單于呼韓邪號昭君曰寧胡閼氏其後呼韓邪單于死其子雕塗莫臯立復妻昭君生二女與匈奴傳稍㳄音旋或作次非漢書西域傳馮夫人善史書乗錦車持節和戎而歸巵言云馮夫人名嫽漢宫人也嫽一作姱烏孫王尚楚公主解憂馮夫人侍公主為烏孫右大將妻薛濤林妙玉黄崇嘏並女人姓名也濤唐人號女校書妙玉宋人號女進士崇嘏王蜀時人號女狀元崇嘏以詩上蜀相周庠薦攝府縣事歲久人莫知其女身也後人傳奇撰為春桃記又餘冬序錄云國初保寧韓貞女偽為男子服從軍征雲南可比古之木蘭妬女廟在并州壽陽縣世傳介子推妹妬婦津在洛水世傳晉劉伯玉妻死投此水為神山東通志云伯玉妻段氏字明光臨濟人妬婦津在臨濟石崇婢綠珠之妹姓宋名偉一作瑋元載寵姬瑤英姓薛浣花夫人姓任氏成都節度使崔寧之妾寧本名旰朝廷因任氏擊賊之功加旰尚書賜名寧任氏封夫人花蘂夫人