body:
  text: 名疑卷一明陳士元撰洞神部云天皇氏姓望名獲字子潤地皇氏姓嶽名鏗字子元人皇氏姓愷名胡洮字文生其説甚妄洞神部晉人作訛稱上清紫微元君書大騩氏大一作泰騩一作塊一作隗一作恢豗傀氏豗一作虺傀一作隗渾沌氏渾一作混沌一作敦倉頡史皇倉一作蒼一作􅀢柏皇氏姓柏名芝即皇柏也柏一作伯中皇氏皇一作黃栗陸氏陸一作睦昆連氏昆一作釐連一作蓄赫胥氏胥一作蘇葛天氏葛一作權尊盧氏尊一作宗祝融氏融一作和一作庸一作誦昊英氏昊一作子一作天乾鑿度作老神氏燧人氏四佐明繇必育成博隕蓲繇一作由必育一作畢育蓲一作丘太昊伏羲氏昊古文作昦又作奭伏一作宓一作虙羲一作戲易通卦驗云伏羲名方牙一曰蒼牙一曰蒼精是為包羲律厯志作炮犧一作庖犧一曰有包氏寶櫝記稱春皇帝王世紀稱天皇路史又稱人帝皇雄氏一作雄皇氏乾鑿度引黃帝云遽理微萌始有熊氏注云有熊氏庖羲也不知何據姓譜云伏羲風姓風一作飌又作偑􅷎􅷎皆古字之變見編海伏羲母華胥氏華胥妹曰叔嫟或作叔姬非伏羲弟郝骨氏唐書宰相氏系表作郝省元和姓纂作郭骨伏羲子咸鳥咸鳥子乘釐乘釐子后照咸一作成釐一作驪照一作昭伏羲師宛華一作鬱華伏羲臣視墨紀侗蹇修墨一作冒一作默侗一作通蹇一作謇一作寋女皇氏庖媧伏羲女弟也一曰㚿媧一曰女羲或作女希或云女媧雲姓或云風姓盧同以女媧為伏羲妃妄共工氏名康回或云回名康其國號山海經云共工臣相柳一作相繇炎帝神農氏姓伊祈一作伊耆路史云神農名軌春秋命厯敘云名石年或作石耳訛神農父少典氏母有僑氏名安登張守節史記正義云神農母曰任姒名女登有媧氏之女也外紀云有蟜氏或作有喬氏又作有橋氏國語又作有矯氏字轉訛神農妃承桑氏一作桑水一作奔水神農師悉諸吕氏春秋作悉老姓辨作悉清神農臣赤奮屏封奮一作糞一作冀一作制屏一作丙封一作翳神農征補侯一作輔侯炎帝臨一作臨魁炎帝直一作值炎帝釐一作來又作氂炎帝居母桑水氏名聽訞太平御覽訞音妖或作聽談又作聽郯字轉訛炎帝克一作扈又作􅀢又作哀字訛炎帝魁時夙沙侯殺其諫臣箕文夙沙一作宿沙一作質沙箕文一作箕父炎帝榆罔一作榆岡史記三皇紀注云易稱神農氏沒即榆岡榆岡猶襲神農之號蚩尤阪泉氏集韻作蚩蛔孔安國又以蚩尤即九黎君謬黃帝有熊氏姓公孫一作老孫更姓姬名軒字玄律史記云名軒轅皇甫謐云居軒轅之丘因以為名又以為號張晏云作軒冕之服故稱軒轅河圖挺輔佐云黃帝名荼淮南子云名伯余難經疏云名全荼余全字轉訛有熊一作有雄黃帝母吳樞氏名符葆宋書作符寶河圖作附寶黃帝四妃元妃西陵氏名嫘祖嫘一作􅀈一作傫古今人表作絫索隱云一作雷祖次妃方雷氏名女節路史作方纍人表又以方雷為元妃絫祖為次妃三妃肜魚氏或作彤魚或作彤雷四妃嫫母説文作憮母皇甫謐作嫵姆黃帝長子帝鴻字休方雷氏所生姬姓更姓釐山海經云帝律生帝鴻律黃帝字也路史云黃帝厭位帝休是立又史記索隱云據左傳則黃帝軒轅亦號帝鴻氏黃帝師赤誦一作赤松黃帝臣力牧一作刀牧鵊治一作鵊冶一作頰治一作俠治窺紀陶濳羣輔録作窺紀謵朋一作習朋一作謂朋恆先一作常先尚儀一作常儀冕侯封禪書作宛朐伶倫一作泠倫人表又作泠淪榮援一作榮猿一作榮將左徹一作扶微大撓一作大橈臾蓲一作車區一作鬼容區一作鬼臾區一作鬼臾蓲或云即雷伯姓名也路史云臾蓲占星車區占風蓋二人俞跗善醫一作隃跗一作踰跗夷牟作矢荀子作浮遊瑣語又以浮遊為共工臣黃帝征茄豐茄一作荷一作茹少昊青陽氏一曰金天氏又號雲陽氏又號白帝朱宣氏又號窮桑氏又號金寶氏又號鳯鳥氏又號桑丘氏又號龍丘氏紀姓名質世紀作摯或作贄縶又作挈栔字轉訛少昊一作小皓古字通用少昊母干類氏名娥一云星娥或作皇娥髙陽氏名顓頊姬姓或曰妘姓或曰風姓號黑帝又號玄帝顓頊父乾荒或作韓流字訛乾荒父昌意黃帝之子也昌意娶蜀山氏名景􅀈生乾荒景􅀈一作景朴一作景僕一作昌僕一作昌濮字轉訛乾荒亦娶蜀山氏名樞是為河女又曰淖子即顓頊母也顓頊蓋昌意孫而史記以為昌意子河女一作阿女顓頊妃勝濆氏名娽勝濆一作勝奔一作滕奔一作騰隍一作勝湟字轉訛娽大戴禮人表俱作女祿女祿生老童一作卷章老童娶根水氏名嬌根水一作郎水一作即水嬌一作橋極一作嬌極老童子黎回回子陸終娶鬼方氏名嬇人表作女嬇大戴禮作女隤顓頊師淥圖淥一作緑又作録又作鹿顓頊臣鱣先一作澶先吕覽又作鱓先帝嚳髙辛氏姬姓名嚳或曰妘姓或曰房姓嚳一作嚳山海經作俊世紀作夋或作逡丹鉛續録云俊即古舜字路史云嚳字亡斤帝王紀云髙辛初生自言其名曰岌嚳岌音相近帝嚳父僑極史記作蟜極或作橋極母陳豐氏名褒陳豐一作陳豐一作陳鋒一作陳酆褒一作握褒見髙堂隆北郊表帝嚳四妃元妃有邰氏名薑嫄邰一作駘一作台嫄一作原是為棄母棄史記作棄次妃有娀氏名簡狄娀一作嵩一作嵩狄一作易一作逖一作翟易逖翟俱音狄是為契母三妃陳豐氏名慶都嚳母族也是為堯母四妃有娵氏名常羲陬音輒史記作娵訾或作陬訾常羲一作羲和一作常戲一作常儀一作尚儀一作常宜一作常耳字轉訛是為帝摯母摯立九年不善而堯代摯一作康嚳師柏昭人表作柏招嚳臣咸黑見吕覽文心雕龍作成纍訛帝堯陶唐氏姬姓堯名一曰姓祈一曰姓伊一曰姓伊祈或作伊耆路史云伊祈堯母家姓也堯古文作一作壵索隱以堯為諡外紀云堯名放勳一云字放勳一云諡放勳均謬勳一作勛堯娶富宜氏名女皇史記人表俱作散宜氏或云即中山夫人堯子朱封丹是為丹朱説文作丹絑即嗣子朱也孔安國以嗣子朱别是一人妄朱兄考監明先死不得封莊子云堯不慈殺長子謬朱庶弟九人尹子云堯囚十子天下不謂其無義淮南子云堯得舜屬以九子而孟軻亦稱九男韓愈以九男為卿大夫族人之子殆謬堯師尹中許繇尹中即尹壽荀子作君疇韓詩外傳又以尹壽為舜師繇一作由字武仲或云許為四嶽之祚堯讓位於四嶽繇在其中繇友巢父子州支父狐不諧嚴僖方回樊豎王倪齧缺被衣子意而子巢古國名或云巢父以棲樹得名子州支父即支伯吕氏春秋作支友狐不諧一作狐不偕嚴僖一作莊僖方回一作方雷楊子巵言以方回為雅州人樊豎髙士傳云字仲父一作仲文王倪人表作王兒被衣國名紀作被陽莊子謂許繇師齧缺齧缺師王倪王倪師被衣被衣蒲衣之子而路史謂舜師蒲衣尸子又謂蒲衣八歲而舜讓以天下計其時前後舛矣子州支父狐不諧皆堯讓天下不受者意而子見莊子世言八元八凱堯未舉而舜舉之凱一作愷夫八元髙辛氏之子伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍也叔獻一作叔戲當是二母生故各以伯仲叔季為名杜預左傳注云伯奮棄契之倫書云朱虎熊羆漢儒以來訓詁之學或云二臣名或云四臣名路史發揮云虎即伯虎熊即仲熊江東呼豹為朱語音轉變是朱為叔豹則羆為季貍必矣人表列八元叔豹之後有季熊師古注云季熊即左傳所謂季貍者也但熊當作羆字訛耳劉敬叔異苑云娵訾氏生而能言及為帝室八夢日而生八子皆有賢智世號八元年代厯又云陳留氏生八元誤八凱髙陽氏之裔路史云夢八人蓋寶櫝記云鄒屠氏八夢日而生八子故曰夢也八凱一曰八神一曰八力一曰八英一曰八明言神力英明耳今所傳八凱之名蒼舒隤􅢺檮㪦大臨厖降庭堅仲容叔達也隤音頺隤􅢺伯益字檮㪦音疇演庭堅臯陶字庭一作霆臯陶一作咎繇故人表列八凱有臯陶而無庭堅仲容路史作中容服虔云八凱垂益之屬杜預云八凱垂益臯陶之倫司馬貞亦云禹在八凱之中是八元八凱堯未嘗不舉而史記乃云十六族者世濟其美堯未能舉舜舉八凱主后土八元布五教故後學相承不辨耳帝舜有虞氏姚姓名舜史記舜名重華真源賦云舜字重華皇甫謐云舜字都君張守節云重華字都君説文舜作舜古文作又作俊俗作􅀈舜父瞽瞍一作瞽叟瞽叟父橋牛橋一作喬一作嬌一作僑橋牛父句望句望父窮蟬一作窮係宋衷以係為諡謬舜母名登一曰握登詩含神霧云握登見大虹意感而生舜河圖注云握登見大虹意感生黃帝黃帝謂舜舜以土王也舜早喪母後母生象或云象隨母嫁者妄亢倉子又以象母為舜之庶母舜妹名㪙手或作擊列女傳又作繫字訛師古人表注云㪙音口果反一作顆史記正義云象妹顆手路史注又作顆首舜二妃娥皇女英皇一作媓一作黃英一作罃列女傳云堯二女也史記正義云娥皇為后女英為妃或云即楚詞湘君湘夫人妄禮記又云舜葬於蒼梧之野蓋三妃未之從也堯典祗云釐降二女而禮有三妃之文鄭氏不得其實乃云舜但二妃其云三妃舉其貴耳此臆説也大戴禮云帝舜娶堯之女匽氏或謂女匽與娥皇女英為三路史云舜元妃娥皇盲無子次妃女英生子二人三妃登比氏生女二人庶媵生子九人登比姓纂作癸比山海經又作登北豈即大戴禮所謂女匽者邪尸子云堯徵舜妻之以媓媵之以娥無女英名豈女英即女匽邪舜子均封商是為商均女英所生也商均一作義鈞舜師蒲衣善卷紀后務成昭善一作單卷一作綣紀一作冀昭一作軺一作跗一作附韓嬰又云堯學乎務成子附莊子云舜問乎丞注云舜師也丞一作承列子又作蒸舜七友者雄陶方回續牙伯陽東不訾秦不虛靈甫也雄一作雒一作能牙一作身一作耳伯一作柏訾一作訿虛一作宇甫一作父莊子又謂舜友石户之農北人亡擇石户之農即石農亡一作無舜臣稷名棄字庚辰見楚詞路史庚作度字訛棄封於邰號后稷司農也或疑庚辰為農字之訛棄娶姞人氏生子漦繭漦一作邰國名紀云漦釐斄台駘邰怡八字古通用契一作偰一作􅠥一作禺一作􅍛封於商賜姓子商人謂之玄王伯益一作柏益一作伯翳字隤􅢺一字虞余見楚詞封於梁壽二百歲後世祀為百蟲將軍世本云化益作井漢志又稱伊益化伊伯字訛荀子云禹得益臯陶橫革直成為輔吕氏春秋云禹得臯陶化益真成橫革之交真成即直成也或云直成橫革即棄契之字臯陶杜預云字庭堅路史則云庭堅髙陽氏之子而臯陶乃青陽氏之裔臯陶父大業娶少典氏之女名華生陶封於臯故稱臯陶帝王紀云臯陶生於偃故賜姓偃臯陶長子費是為大費秦之祖也次子甄是為仲甄封於六秦本紀云大業娶女華生大費而正義即以大業為臯陶殆謬吕覽注云伯益臯陶之子亦謬伯夷為秩宗封於吕朝鮮記云伯夷生西嶽路史注云泰嶽伯夷之子或云伯夷蓋四嶽之長其子襲職故稱西嶽泰嶽耳書有四嶽僉曰之文僉者衆詞也而太史公乃以四嶽為一人韋昭又以四嶽為伯夷嶽一作嶽孔平仲云以四嶽為一人乃合二十二人之數或云漢書三公一人為三老次卿一人為五更注云五更知五行者安知四嶽非知四方者乎劉泰之云後世五官中郎四門博士之職非五人四人也則四嶽為一人明矣伯與路史作伯譽人表作柏譽殳斨一作殳戕垂一作倕即伯夷父也垂嘗為帝嚳臣又為堯舜臣壽逾數百歲舜誅四凶渾沌窮竒檮杌叨餮乃四獸之名渾沌帝鴻氏不才子歡兜也一作歡兜一作歡一作歡頭古文尚書作鴅吺或云縉雲氏子帝鴻孫也窮竒少皥氏不才子服虔云共工是也檮杌顓頊氏不才子賈逵云謂鯀也檮杌一名傲佷一名難訓見史記注叨餮即歡兜子三苗也山海經云顓頊生歡頭又云鯀妻遺腹生歡頭歡頭生苗民是歡頭為禹少弟苖民其姪也然書稱禹格有苖則山海經謬山海經又云三苗一名三毛音訛夏王禹姒姓禹名顔師古云禹字史記云名文命系夲云字髙密帝王世紀云字密均謬禹為崇伯之子故稱伯禹又稱大禹治水成功又稱神禹夫堯舜禹湯皆名而皇甫謐等以為諡又會附其説别出名字妄甚古文禹作又作禽禹父鯀一作鮌一作􅕐一作􅦡漢書律厯志云顓頊五代而生鯀系本以鯀為顓頊子非索隱云鯀字熙茂州汶川人也連山易云鯀封於崇國語謂之崇伯左傳作崈伯鄭子産謂鯀殛羽山其神化為黃熊入羽淵黃熊或云黃龍或云玄魚熊一作能音奴來切鱉屬也禹母有莘氏之女名志或作女嬉是為修已莘一作姺志一作娡已一作紀禹生於僰道之石紐鄉刳兒坪世傳修已坼胸生禹世本淮南子俱云禹生而母化為石禹娶塗山氏之女名趫一曰攸女是為啓母趫一作嬌一作喬系夲云塗山氏女名女媧趫嬌喬媧字訛塗古文尚書作嵞正韻作峹禹師大成摯墨如子髙西王國摯一作贄一作執墨如子髙即柏成子髙山海經作柏髙墨一作默柏一作伯西王姓國名國一作慖一作悝白虎通義以為國先生恐虞夏時無此稱號荀子注云禹生於西羌西王國西羌之賢人禹臣童律狂章能制水怪童一作僮一作􅥧范成光郭哀為御哀一作裒豎􅀈步地里定大小之國七千豎一作堅􅀈一作亥后夔娶有仍氏之女曰玄妻生子伯封作衍厯伯封一作伯封叔或云叔其字也奚仲之子吉光為車正一作吉先扶登氏典樂一作徠登儀狄作酒狄一作翟鬻子云禹有七大夫臯陶杜子業既子黥施子黯季子寧然子堪輕子玉也業一作墨又作默黥一作黔寧一作冉列女傳云皋子生五歲而贊禹言皋一作臯或云即臯陶也夏王啓一名會紀年作余年代厯作建或云啓字開故山海經楚詞俱作夏后開一云避漢諱也啓臣孟凃能禮神封於丹凃一作塗啓征有扈一作有户秦改作鄠古文作屺夏王仲康史記作中康胤侯一作嗣侯避宋諱也路史作徹侯字訛夏王相仲康子世紀作相安相叛臣羿一作有窮國君也是為夷羿有窮一作有一作窮石羿學射於楚狐父一作狐甫羿棄武羅柏因熊髠龎圉之賢而用逄蒙寒浞柏因一作柏因熊髠一作雄髠龎圉一作厖圉逄蒙荀子作蜂門淮南子王褒頌作逄門七略作蜂蒙論衡作龎門古字通用寒浞一作寒促寒君伯明之讒子弟也寒猗姓一云邙姓猗一作徛寒促蒸羿之妻曰純狐殺羿而納為室純一作統純狐生二子曰澆曰豷澆論語作奡一作敖傲嫯古字通用豷一作􅜦奡淫於其嫂曰女岐一作女跂逢蒙弟子曰鴻超一作鴻起一云逄蒙弟也夏王少康相遺腹子也奡殺相后緡逃歸有仍緡姓少昊之裔有仍人表作有扔少康臣伯靡女艾靡名伯字女姓艾名也女一作汝伯靡自有鬲收二斟之衆以滅浞女艾殺奡伯杼殺豷有鬲臯陶之裔一作有隔二斟斟灌斟尋也尋一作鄩一作􅴙一作潯夏王杼即伯杼也是為帝輿始造矛甲年代厯云杼字松曼或作公孫曼字訛杼一作柠一作佇一作寧一作豫集韻云豫夏后名史記云帝少康崩子帝豫立是也路史云伯杼伐三壽三壽東夷國名一作王壽一作平壽字訛伯杼弟曲列龍苗季扞曲列一作曲烈封於鄫一作繒是為曾點之祖史記點作蒧龍苗居有仍為竇氏季扞一作季杼封於越是為句踐之祖夏王槐杼子也槐一作懷一作魁是為祖武世紀云槐一名芬或云槐名芬字也班固人表帝芬帝槐並列誤矣左傳郵無恤即王良范武子即士會而人表乃列為四人其誤同此夏王芒一名和槐子也芒一作芷一作荒路史又作芒如夏王泄芒子也是為世宗泄一作泄夏王不降泄子也降音江山海經作帝江世本世紀俱作帝降路史作北成或作江武或作江成字訛夏王扃不降子也年代厯云一名髙陽扃一作喬一作禺一作愚字轉訛夏王厪一名頓扃子也頓一作頊厪世紀作廣年代厯作董或作量江又作董江字訛夏王孔甲路史作胤甲厪子也不降其曾祖史記以孔甲為不降子誤左傳劉纍豢龍事孔甲或以為師門列仙傳云介登師門者冀人嘯父之弟子也能使火為夏孔甲御龍正韻御音迓夏王臯孔甲子也臯一作皋一作昊路史作簡臯世紀年代厯俱作臯簡夏王發一名敬一名惠臯子也年代厯作發惠路史作敬發夏桀一名履癸史記人表俱云發子世本云發弟臯子桀諫臣關龍逄關一作豢逄一作龎潛夫論以為桀之大夫戰國䇿以為桀之良將竹書以為諫瑤臺新序以為諫酒也路史以為引圖進諫立朝弗去而死韓子以為傷其四肢符子以為就炮烙夏太史令終古黃帝裔任姓之後也終一作佟一作泈桀佞臣于莘推侈尹諧斟觀岐踵戎曹觸龍任威趙梁于莘外紀作芉辛吕覽作羊莘國名紀作干辛于又作邘推侈韓子作侯侈路史作侯哆尹諧見家語諧一作偕斟觀荀子作斯觀岐踵戎一作跂踵㣝曹觸龍説苑以為桀之太師世紀以為左師韓嬰吕覽荀子又以為紂臣任威即援神契所謂折玉斗失金椎者威一作咸趙梁獻計囚湯於夏臺臺一作均桀妃妹喜路史注云妹者以妹妹目之或音秣非也喜音希人表作末嬉荀子集韻並作未喜一作妹嬉王逸云桀伐蒙山得妹喜蒙山國名故世傳妹喜姓蒙氏洛書録運法以為逄氏蒙逄音訛楚詞天問云桀伐蒙山何得焉列女傳云妹喜有施氏得之國語云桀伐有施施人以妹喜女焉師古即以為有施氏之女外紀從之誤矣路史云桀命扁伐岷山岷山莊王以二女御焉愛而無子乃刻之苕華而棄元妃於洛扁桀臣岷山即蒙山也二女曰琬曰琰刻名苕華之玉詳焞煌紀年吕覽伊尹云桀迷惑妹喜好彼琬琰是也或云元妃即妹喜然夏以妹喜亡今云棄元妃於洛恐非妹喜淮南子湯敗桀於歷山與妹喜同舟浮江奔南巢之山而死山海經湯伐桀於章山荀子云桀死亭山桀子淳維擕桀衆妾遁於北野晉史云淳維禹後或又以為黃帝後或云淳維即熏鬻也然熏鬻非桀子熏一作獯鬻一作粥黃帝時已有熏鬻矣商王先世契封於商賜姓子契子昭明禹命作衍厯昭一作招昭明子相土世本云相土作乘馬謂車制始於黃帝備於奚仲而四馬駕車之法始於相土也荀子云杜作乘馬楊倞注云杜與土同楊慎丹鉛續録云土即古杜字相土子昌若昌若子曹圉人表作根圉系本作糧圉一作糧圉曹圉子冥一作鄍世本云曹圉子根國根國子冥是冥乃曹圉孫與史記不同冥子振系本作核振子微一作上甲微皇甫謐云微字上甲以甲日生故也商王以日為名自微始微子報丁報丁子報乙報乙子報丙報丙子主壬主壬子主癸主癸子天乙是為成湯易稱帝乙譙周云天亦帝也王勃益州廟碑云天帝乙商王成湯名天乙一云字湯一云諡湯一云名履字天乙商人謂之武王詩云武王載斾毛傳云武王湯也湯妃有莘氏女莘一作姺兟甡㳯古字通用湯師貸子相司馬彪云貸姓子相名姓源及國名紀並云成湯時有貸子國是貸子姓也一云貸國子爵相名新序云湯學於成子伯成姓伯名成一作威伯一作柏一云貸子成子尊稱之辭韓詩外傳云湯學乎貸相務光卞隨紀他申屠狄夏商之際髙士也務一作瞀一作牟莊子謂湯以天下讓卞隨隨投椆水又讓務光光投盧水而死吕覽云隨投潁水光投募水紀他帥弟子踆於窽水申屠狄踣於河逸士傳云禹聘務光為上卿光投於河仙傳云武丁欲以務光為相光投梁水皇甫謐又以務光為黃帝時人湯臣伊尹名摯一作贄史記云名阿衡一云號阿衡一云尹正也伊尹伊國之尹也皇甫謐云伊尹力牧之後生於空桑吕氏春秋云有侁氏女採得嬰兒於空桑後居伊水命曰伊尹一云伊尹伊耆氏之後而世紀以為有莘氏之媵臣年紀又謂伊尹交於妹喜遂間夏均妄殷本紀云伊尹從湯言素王及九主之事劉向别録云九主者有法君専君授君勞君等君寄君破君國君三歲社君凡九品國君一作固君謂完城郭利兵甲而不修德之君也索隱云寄君者謂人困於下主驕於上離析可待故孟軻謂之寄君今軻書無此語仲虺奚仲之後史記作中􅣂一作中􅻰一作中壘一作仲傀荀子又作中蘬虺弟雍滑一作容滑萊朱古萊侯之系一作郲朱趙岐孟子注云萊朱即仲虺也女鳩女方少康臣女艾之後夏棘字子棘列子作夏革慶誧一作慶輔湟里沮湟里姓沮名一作且東門虛南門壖西門疵北門側各以所居為姓虛一作虞壖一作蠕疵一作訿登恆費昌二臣為御恆一作桓義伯仲伯作典寶義伯書序作羲伯仲伯人表作中伯商王仲壬史記作中壬商王沃丁臣咎單咎一作臯或音舊商王小甲史記以為太庚子世表以為弟商王大戊雍已之弟是為中宗書云在大戊時則有若伊陟臣扈格於上帝巫咸乂王家伊陟伊尹子陟一作敕見封禪書徐廣注臣扈與湯時逸書臣扈同名故人表臣扈注云湯臣路史注云大戊時臣扈國於薛仲虺之後巫咸巫姓咸名咸子賢為祖乙臣書序伊陟作原命原大戊臣又大戊臣王孟採藥於丈夫國見山海經注王一作巫商王沃甲系本作開甲商王盤庚盤一作般一作􅀈商王小乙臣甘盤一作甘般商王武丁是為髙宗傅説為相史記云説為胥靡築於傅險遂以傅險姓之姓譜云堯子朱封房侯房之後有貍氏裔子大繇夏后氏封之傅為傅氏事載國語韋昭云貍氏在周為傅周當作商莊子云傅説騎箕尾而比於列星商王祖庚臣祖巳仲虺之後商王廩辛一作慿辛商紂帝乙子紂一作盩史記云名辛周書又稱受經世書又稱受辛紂受音相近或云紂諡也紂賢臣九侯鄂侯梅伯祖伊比干箕子商容膠革辛甲隂競九一作鬼一作􅢿鄒誕生云音仇鄂一作邘一作邢一作翼梅伯子姓九域志作殷伯集韻梅音每祖伊祖已之後比干紂諸父名干封於比故稱比干比干子堅逃於難林堅一作竪箕子舜後宋世家云箕子紂之親戚蓋外親耳而鄭玄王肅馬融以為紂之諸父伏虔杜預以為紂之庶兄均誤莊子注云箕子名胥餘或云胥餘比干字也商容鄭玄云樂官知禮容者所以禮臺稱容臺膠革古膠侯之裔革一作鬲辛甲禹後事紂七十五諫不從文王以為史隂競史記龜䇿傳作隂兢紂投文王於石室隂競活之與之俱亡入周石室即羑里一作牖里紂佞臣費仲惡來左強師延費仲惡來皆伯益後費仲一作費中惡來一名革蜚廉子秦之先也左強即象郎師延樂師名延作靡靡之樂者紂妃妲己皇甫謐云有蘇氏美女國語云有種氏女索隱云妲字己姓也妲音多刺切五音編海作妲姬非紂子武庚一云祿父或云武庚名祿父字殷七族有繁氏飢氏條氏繁一作媻飢一作耆一作黎條一作蓨微子啓紂庶兄微國子爵啓名家語微作魏一作郿魏郿俱讀音微史記啓作開伯夷叔齊父孤竹君姓墨胎名初字子朝見韓嬰詩傳墨胎炎帝後一作默台一作默怡商湯即位元祀三月丙寅封墨胎氏於孤竹是其受封之始伯夷名允字公信叔齊名致字公逺吕覽致作智逺作達夷齊諡也孤竹君中子名慿或云即伯僚君伯字誤蓋兄為伯夷弟為叔齊則慿宜稱仲僚耳僚一作遼名疑卷一
