body:
  text: 名疑卷二明陳士元撰周先世后稷生釐蠒釐蠒生叔均後裔有不窋者失其官守史記世夲世紀俱以不窋為后稷子國語亦云不窋事虞夏惟路史以為夏末時人不窋子鞠有文在手曰鞠因以為名一云鞠陶鞠子公劉公劉子慶節國於豳一作邠慶節子皇僕皇僕子差弗一作弗差差弗子毁隃一作偽隃一作毁榆毁隃子公非世本云公非辟方公非子髙圉世本云髙圉侯牟侯牟一作侯侔一作夷岐一作夷竢髙圉子亞圉系本云亞圉雲都皇甫謐云公非字辟方髙圉字候侔亞圉字雲都然人表又以雲都為亞圉弟則辟方侯牟亦二人名也史記云亞圉子公叔祖類公叔祖類子古公亶父路史云亞圉弟雲都子叔祖紺是為祖類祖類子諸盭是為太公太公子亶父是為古公太王世表云太公即祖紺諸盭即叔類皇甫諡云公祖一名祖紺諸盭字叔類號太公諸説不同莫可綜核豳公亶父自商王小乙二十六祀避狄遷岐之周邑始改號曰周故史記稱季歴曰周公季歴文公旦食采周邑故亦稱周公春秋傳周公閲周公楚等皆旦後裔為周卿士者也漢書郊祀志大王建國於􅑢注云􅑢古岐字史記龜䇿傳紂殺周太子歴囚文王昌索隠云季歴不被紂誅恐周别有太子名歴殆附會史記之謬季歴母太姜文王母太任列女傳云太姜有台氏之女太任摯任氏之中女國語注云摯國任姓周文王師鬻熊疇錫子斯鬻一作粥疇錫複姓子斯字疇錫韓詩外傳作錫疇新序子夏云文王學於時子思武王學於郭叔或云時子思即疇錫子斯也郭叔即虢叔西伯戡黎大傳作西伯戡耆史記言文王伐􅢿周公旦師庶秀一作庶和史記周本紀成王誦一作庸共工翳扈世本作伊扈懿王囏世本作堅幽王宫涅一作生恵王閬世本作母凉敬王子元王仁世夲作貞王介元王子定王介世夲作元王赤皇甫謐云元王崩三子爭立立應為貞王索隠云元王有兩名一名仁一名赤如史記則元王為定王父定王即貞王也依世夲則元王為貞王子必有一誤定當作貞簡王之前已有定王周家豈有兩定王乎皇甫謐疑而不决遂彌縫史記之誤稱為貞定王亦未為得也考王帝王世紀作考哲王皇覽作考悊王悊與哲同赧王延尚書中候作然王延皇甫謐作赧王誕厲王胡奔彘有共和十四年史記云周召二相行政號曰共和然人表有共伯和師古注云共國伯爵和名也魯連子云共伯名和好行仁義諸侯賢之請立焉後歸於國得意共山之首莊子及吕氏春秋俱云共伯得志於共首司馬彪云共伯和修行好賢厲王之難天子曠絶諸侯立和為天子一十四年天下大旱卜於太陽兆曰厲王為祟召公乃立宣王共伯歸國史記周召共和之説無據夫周召共和之説其即晉文侯義和之訛乎文侯名仇字義和周平王東遷文侯有功王室平王錫文侯有文侯之命王若曰父義和者稱文侯字也蔡注是矣文侯十一代孫文公重耳又有功王室襄王使王子虎命晉侯為伯史記晉世家誤取尚書文侯之命屬於重耳之下而馬融王順注史記並云王若曰父義和者言父能以義和我諸侯豈不謬哉周卿甘昭公即恵王子大叔帶左傳王子帶是也封甘謚昭劉文公卷一名狄一名伯蚠或云伯蚠字也單公子愆期一名成愆尹文公固一作圉樊仲一作樊皮一作樊仲皮周太王子虞仲之裔孫仲山甫事宣王食采於樊此其後也名皮字仲故曰仲皮王叔文公即王子虎文謚也王扎子即王子捷扎名捷字周武王封仲雍之後於呉系本云呉孰哉居藩籬宋衷云孰哉仲雍字解者云雍是熟食熟孰古文通用故雍字孰哉史記世家呉子轉一作柯轉呉子頗髙一作頗夢呉子句卑一作畢軫呉子壽夢一名乗壽夢子四人長諸樊次餘祭次餘昧次季札諸樊春秋經云呉子遏左傳稱諸樊索隠云諸樊其號遏其名公羊傳遏作謁餘祭一名載呉襄二十八年左傳齊慶封奔呉呉句餘與之朱方杜預云句餘呉子夷末也索隠云餘祭以襄二十九年卒則二十八年賜慶封邑不得是夷末但句餘或别是一人杜預誤為夷末耳夷末惟史記公羊作餘昧左氏穀梁並作夷末季札居延陵號延陵季子史記以延陵為季札封邑呉王遼一名州于史記以為餘昧子公羊傳以為壽夢庶子呉公子燭庸蓋餘二人皆呉王僚之弟蓋餘左傳作掩餘勇士専諸一作鱄設諸一作専設諸太宰嚭一作噽字子餘晉伯州黎之孫州犂仕楚為大夫嚭避難奔呉虞亦謂之西呉太王生仲雍仲雍生季簡季簡生叔達叔達生周章及虞仲武王求太伯仲雍之後周章已為呉君即封章於呉别封章弟仲於虞在周之北是為虞仲周章在東故虞仲稱西呉傳十二世與西虢同為晉所滅二虢者虢仲虢叔王季子文王弟也武王封仲於西虢封叔於東虢故稱二虢西虢滅於晉東虢滅於鄭春秋叔孫豹會於虢公羊作漷一作郭蔡叔度之子蔡仲名胡字仲左傳蔡宣公考父史記作措父繆侯史記作穆侯靈侯班一作般平侯廬一作虚襄公一作聲公年表蔡有兩景公一名同文侯子同一作固一名朔昭侯子此景侯史記作成侯年表云景侯即成侯之髙祖父曹叔振鐸之後恵伯兕年表作恵公伯雉孫檢云曹恵伯或名雉或名兕或名弟或名弟兕桓公終生一作終湦左傳莊公射姑史記作夕姑釐公赤史記作僖公夷昭公班公羊作般宣公廬史記作彊武公滕史記作勝聲公野悼公弟也系本無聲公曹公子首公穀並作公子手武王封曹挾於邾傳二十九世而邾友以父武公伯顔之功封於郳徙於繹是為小邾子邾子克左傳作儀父杜云克字儀父邾子牼公穀並作􅗎邾大夫黑肱公羊作黑弓邾畀我公穀並作鼻我杜云畀我庶其之黨古字畀鼻通用如象封有庳又作有畀有鼻也衛康叔名封武王封之弼書作妹邦詩作沬弼妹沬音相近康叔子康伯髠左傳稱王孫牟父宋衷云髠即王孫牟也牟髠音相近古史考無康伯而云子牟伯蓋父子俱謚康故因其名云牟伯也衛康伯一作疌伯一作摯伯貞伯一作箕伯文公燬初名辟彊更名燬左傳穆侯速公羊作遫史記殤公秋班氏作焱左傳作剽敬公費一作弗昭公糾一作舟慎公父公子適一作䖍聲公訓一作聖公馳一作聲公馴成侯遫一作不逝衛大夫武仲乙即孫仲孫姓乙名仲字武諡也石圃乃石惡從子吕覽注以石惡即石圃誤州吁穀梁作祝吁大叔疾一作世叔齊公叔發即貞恵文子也發一作拔蘧伯玉名瑗諡成子乃莊子無咎之子也公子郢字子南乃靈公之子世本云靈公子昭生子郢非公子鱄穀梁作専唐叔虞字子于虞子爕父是為晉侯世家晉厲侯福一作輻獻侯籍一作蘇穆侯費一作㵒一作費生一作弗生春秋獻公佹諸左傳作詭諸襄公驩公羊作讙世家作歡靈公夷臯公羊作夷􅀈景公獳世家作據厲公州蒲世家作壽曼此獻公厲公與前厲侯獻侯同諡而世代不同世家悼公周一作糾商公去疾一作去即出公錯一作鑿年表云出公錯十八年哀公忌二年懿公驕十七年世夲云昭公生桓子雝雝生忌忌生懿公驕世家云出公十七年哀公驕十八年而無懿公靜公俱一作俱酒晉大夫成伯缺即士穀士姓成諡士季㑹伯缺之子初封隨改封范故稱隨㑹又稱范武子㑹名季字武諡也彘季即恭子士魴食采於彘與先榖同字折成鮒即士鮒知武子荀罃國語注云罃字子羽知伯襄子荀瑤杜云荀躒之子類解云躒之孫也孫伯黶孫伯字黶名司晉典籍故稱籍黶狐射姑一作夜姑字季佗食采於賈故稱賈季狐鞠居字伯食采於續故稱續簡伯簡諡也欒糾一稱弁糾羊舌肹字叔向一字叔譽楊食我字伯石一名子我郤芮字子公食采於翼一稱翼芮冀缺即郤成子也一稱翼缺郤犨即苦成叔苦邑成諡叔字也犨一作州先軫一稱原軫先榖一稱原穀榖一作縠季子胥臣季子字胥臣名食采於臼故稱臼季張老即張孟老名孟字唐表云張仲裔仕晉為大夫生老老生張孟趯趯名孟字是父子俱字孟也詹嘉一作瑕嘉一作處瑕晉卿韓趙魏三分晉國韓之先周同姓姬氏其苗裔事晉封於韓原曰韓武子又三世而有獻子厥生宣子起起生貞子頃系本貞作平頃生簡子不佞系本作不信不佞生莊子庚庚生康子虎史記無簡子莊子而云貞子生康子班氏亦然康子生武子啓章啓章生景侯䖍䖍生烈侯取烈世家作列系本作武烈侯生文侯索隠云紀年無文侯系本無烈侯趙之先自造父受封於趙城六世而有奄父奄父生叔帶去周事晉又五世生趙夙世家云夙生共孟共孟生趙衰字子餘系本云公明生共孟及趙夙夙生成季衰衰生宣孟盾左傳云衰趙夙弟與世家系本不同晉景公立趙武是為文子生景叔成成生簡子鞅鞅生襄子母䘏母䘏卒而獻侯浣立浣代成君之子代成君名周伯魯之子也系本以代成君為襄子之子不云伯魯之子非年表浣作晚即以為襄子之子亦非浣生烈侯籍年表烈作列魏亦文王之𦙍武王封庶弟髙於畢後裔畢萬事晉封於魏萬生武子左傳武子名犨系本云畢萬生芒季芒季生武仲州索隠云州犨音相近但世代不同史記武子生悼子悼子生昭子絳系本云武仲生莊子絳無悼子索隠以系本為誤絳生獻子嬴系本嬴作荼嬴生魏侈一作魏哆系本獻子生簡子取取生襄子多左傳作魏曼多索隠云侈哆多字訛世代亦不同魏文侯斯史記斯作都或作􅗢斯弟樓季或云樓季為兄斯生武侯擊擊生罃是為梁恵王罃一作韺一作嬰世家恵王生襄王襄王生哀王哀王生昭王系本云襄王生昭王而無哀王誤世家景湣王增系本增作午韓相有陳筮俠累韓將有司馬庚陳筮一作陳筌一作田荼俠累一作俠傀一作法其司馬庚一作司馬唐趙相有大戊午周祒大戊姓午名戊一作成祒一作紹魏將有芒卯皇欣師武芒一作孟欣一作祈師一作犀文王異母弟煇唐表作燿文王少子季載武王封之冉或作那􅀈􅳙聃周公旦封於魯子伯禽伯字禽名楚語作禽父左傳類解云成王命周公為太宰食邑扶風之周城號宰周公留相天子乃封其長子伯禽於曲阜為魯公英賢録云伯禽庶子名梁其一作梁箕世家魯考公酋一作就一作遒煬公熈一作怡幽公宰一作圉魏公㵒魏一作微㵒一作弗厲公擢一作翟貞公濞貞一作慎一作順濞一作摯一作嘷恵公弗湟一作弗皇一作弗生隠公息一作息姑桓公軌一作允一作兀閔公啟一作啟方一作閔公開宣公倭一作俀一作接昭公椆一作裯一作祒哀公蔣一作將穆公顯一作衍平公叔一作旅文公賈一作湣公賈凡蔣邢茅胙祭皆周公子所封國凡一作􅀈祭之後有祭公謀父作祈招之詩謀父祭公字也杜預云祈父周司馬招其名朱子云招當如徵招角招之招詩歌之名也詩稱祈父書作圻父祈圻古通用左傳小君聲姜公榖作聖姜春秋叔孫舍左穀並作婼音綽子服恵伯椒即孟椒一作孟湫公子友即季成季字成諡也公父文伯名歜其父穆伯靖字公父故歜以父字為氏靖乃季孫紇之子或云紇之孫誤公父一作公甫古字通用叔孫轍字子張公羊轍作座季孫意如公羊作隠如大夫挾榖梁作俠公亥即公若公山不狃即弗擾字子洩叔轍字伯張一云字子張是與叔孫轍同字也臧僖伯即公子彄僖諡伯字杜云彄字子臧以字為氏鄭氏云彄食采於臧以邑為氏杜注誤孟孺子名洩一名彘即懿子也襄仲公子遂即仲遂公孫兹公羊作慈柳下恵姓展名禽食邑柳下諡恵國語注云名獲字季禽郈昭伯郈一作厚一作后左傳厚成叔瘠檀弓后木是其族也文王第十四子錯叔繡武王封之滕十七世宣公始入春秋悼公寧公羊作甯召公奭亦姬姓成王封之燕史記世家燕有兩文公三桓公又有燕鄭侯燕今王諡法無鄭今二字不可强通今一作金燕相栗腹燕將騎刼栗騎姓腹刼名腹一作股太公望姓吕名尚一名㳙字子牙説文吕旅膂通用譙周云姓姜名牙成王封之齊世家丁公伋楚語作級一作及世家癸公慈母哀公不辰成公脱莊公購系本癸作􅂒母作心辰作臣脱作説購作贖簡公壬或云悼公子或云景公子宣公積年表作就匝史記管晏列傳云管仲夷吾晏平仲嬰管姓仲字夷吾名又左傳閔元年注管仲名敬仲或云名敬字仲是管仲名敬又名夷吾也或云敬諡也韋昭云管仲姬姓之後管嚴之子世本云莊仲山生敬仲夷吾莊即嚴也或云管莊字仲山或云莊諡仲字山名晏子名嬰諡平字仲髙偃諡武子乃髙傒𤣥孫髙酀之子或云偃即酀一人也髙柴髙傒十代孫字季羔論語作子羔國佑即國賓慶隻即慶䋲隻音纈弦施即弦多公孫捷字子車一作子淵苑茷一作宛茷刁勃一作刁㪍顔蠋一作顔斶一作顔歜武王封胡公滿於陳以奉舜祀左傳陳哀公元妃鄭姬生悼太子偃師陳世家云哀公娶鄭長姬生悼太子師少姬生偃左傳湣公周世家周作越陳厲公佗之子完字敬仲奔齊封於田是為田敬仲厲公左傳名躍系本有陳利公躍利即厲也是厲公名躍非名佗蓋佗是厲公之兄一名五父春秋經蔡人殺陳佗左傳蔡人殺五父非厲公也田敬仲穉孟夷系本作夷孟思索隠云穉名孟夷字也孟夷生湣孟莊湣諡孟字莊名莊一作芷一作克湣一作閔襄子盤一作班一作塈一作暨莊子白一作伯齊威王因一作因齊湣王地一作遂陳公子御寇公榖作禦寇大夫洩冶公榖作泄冶孔奐公羊作孔瑗伯爰之後有袁濤塗袁頗轅咺轅買爰袁轅古通用女叔即原仲女姓叔字也越王勾踐夏后氏苗裔允常之子也是為菼執菼執子鼯與史記作鼫與紀年作鹿郢樂資云越語呼鹿郢為鼫與也鹿郢子不壽是為盲姑一作育姑盲姑子翁是為朱勾一作於勾越大夫泄庸舌庸柘稽文種范蠡計然泄庸一作洩容舌庸一作后庸或云泄庸即舌庸柘稽國語作諸稽郢韓詩外傳作亷稽文種字子禽一字少禽史記大夫種劉氏云大夫姓種名非也范蠡字少伯越絶書稱范伯計然姓辛名鈃字文子葵丘濮上人其先晉公子也明習隂陽見微知著故稱計然遨逰海澤又稱漁父漢書貨殖傳粤王勾踐用范蠡計然遂報强呉孟康注云姓計名然蔡謨云計然者范蠡所著書篇名非人也師古云蔡説謬矣古今人表計然列在第四等一名計研班固賔戯研桑心計於無垠研謂計研也又呉越春秋及越絶書俱作計倪蓋然研倪音訛漢碑計作峜武王封東樓公於杞以奉禹祀杞世家謀娶公謀一作謨德公一作恵公出公敕一作欶一作遫文公益姑一作亦姑平公鬱一作郁釐一作鬱来武王封姜文叔於許以奉太岳之祀左傳許元公成公羊傳成作戌汪氏以元公即許男斯非也周書吕侯作吕刑史記云甫侯或作郙侯吕亦太岳之後成王封熊繹於楚其先出顓頊裔孫陸終第六子季連芉姓季連生附沮一作附祖其苖裔曰鬻熊事文王鬻一作粥鬻熊曾孫熊繹事成王受封居丹陽即今歸州楚世家熊􅲂一作黮一作亶熊渠長子康中子紅少子執疵康一作庸一作母康徙都江陵是為句亶王一作句袒紅一作贄紅一作䙝紅為鄂王即今武昌俗傳武昌鄂王神即熊渠之子紅也執疵一作疵為越章王即今雲夢地越章一作就章譙周云熊渠子熊翔熊翔長子摯有疾少子熊延嗣樂緯亦云熊渠嫡孫熊摯有惡疾不得為後别居於䕫為附庸是為䕫子二説與世家不同熊嚴四子伯霜仲雪叔堪季徇堪一作湛季徇子熊咢一作噩若敖熊儀左傳類解云楚人謂未成君為敖也霄敖熊坎一作熊􅌲霄敖一作宵敖一作敖霄蚡冒熊眴一作熊咰蚡冒一作蚡冐一作粉冒武王熊通徙都郢即今荆門地改荆號楚世家云文王熊貲始都郢也堵敖熊囏一作熊勤堵敖世家作杜敖索隠云一作壯敖又作莊敖字訛成王熊頵世家作惲莊王旅世家作侶或作吕古字通用康王熊昭世家作招郟敖熊麏一作麇字同世家作員音雲熊麏葬於郟故號郟敖靈王熊圍一作回改名䖍平王熊棄疾改名居昭王熊壬改名軫世家作珍徙都鄀今宜城地鄀亦稱郢簡王熊中一作仲聲王熊當一作常悼王熊疑一作類考烈王熊元系本作完徙都壽春今壽州地壽春亦稱郢哀王熊猶一作由楚大夫令尹子元即王子善鬬榖於莵字子文一作榖於擇又作榖烏䖘石賡云榖本作彀乳也借作榖鬬般即申公班字子揚箴尹克黄子文之孫子揚之子改名生郊尹蔓成然字子旗一作子期食采於蔓成諡然名也伯棼越椒一作伯賁越湫鬬祈一作鬬耆蒍叔孫叔敖蒍賈之子也系出蚡冒之子薳章食采於薳因氏薳音偉一作蒍古字通用蒍姓敖名孫叔字也後裔即以孫為姓何孟春云孫敖名饒字叔敖此據孫叔碑耳是孫叔名敖一名饒也左傳蒍艾獵世本云叔敖之兄先儒以艾獵為敖字誤矣薛氏人物考云孫叔敖一名蒍艾獵尤謬蒍姓也豈名乎金履祥云敖楚官號謂楚有若敖莫敖之職則敖亦非名矣左傳成虎榖梁作成熊公羊作熊然息公子邊即屈禦寇子邊字也為息尹伍舉即椒舉食采於椒一作湫舉伍尚即棠君伍員字子胥奔呉與之申一稱申胥文之無畏字子舟一稱申舟蓋申無宇之後也養由基一作養叔由基名叔字湯相仲虺舊封於薛臣扈祖已皆仲虺之胄祖已七世孫曰成徙國於摯摯君之女大任生周文王武王克商復封於薛獻公始入春秋薛伯夷公羊作寅武王封微子啓於宋以奉殷祀啓弟衍是為微仲衍名仲字也家語云微子弟仲思名衍一名泄禮記云微子舍其孫腯而立衍腯一作質宋世家厲公鮒一作魴文公鮑一作鮑革襄公慈父春秋作兹父公羊作慈成公王臣榖梁作壬臣昭公杵臼公羊作處宋有兩昭公一名杵臼年表云襄公之子徐廣云成公少子一名得元公庶曽孫公子周之子也得一作特公子周一作公子糾辟公兵一作桓侯辟兵一作桓侯璧兵一作桓侯璧宋大夫皇父充石戴公子也皇父字充石名樂喜字子罕即司城子罕也唐表以子罕為樂喜之子誤鱗朱乃鱗矔曾孫杜云矔之孫華耦字子伯乃華督曾孫杜云督之孫蕩澤字子山世本云蕩虺子杜云蕩意諸之子向戍乃向守之子桓公𤣥孫杜云桓公曾孫均誤世子痤榖梁作座大夫向寧公羊作向甯公子地公羊作池武王封少昊之裔兹輿期於莒渠丘公季佗一名朱或云季字佗名黎比公宻州一名買朱鉏或云買朱字鉏名左傳展輿著丘公之弟公榖並作展無輿字莒大夫務婁瞀胡烏存務瞀烏俱姓紀國炎帝之裔春秋紀子伯左傳作子帛杜云子帛紀大夫裂繻字也左傳裂繻經則作履緰公羊乃以為紀子名伯非大夫周穆王名滿昭王瑕之子也周内史過云昔昭王娶於房曰房后實有爽德協於丹朱丹朱馮身以儀之生穆王焉事頗誣恠朱丹神也穆王封造父於趙造父之先大費佐舜大費生大亷事夏啓為烏俗氏俗一作浴一作洛一作路大亷𤣥孫孟虧仲衍孟虧張華作孟舒仲衍事商太戊人表作中衍仲衍𤣥孫仲潏一作中滑仲潏生蜚亷一曰處父事紂蜚一作飛造父其𤣥孫也秦趙同祖秦文公子靜公一作竫公寧公一作曼公共公假一作瑕共公子景公一作僖公一作哀公景公子哀公一作㻫公一作畢公秦本紀云靈公季父是為簡公始皇本紀又云靈公生簡公索隠云簡公懷公之弟劉伯莊云簡公昭公之弟懷公之子厲公之孫本紀以簡公是厲公子誤厲共公一作刺龔公躁公一作䟃公昭襄王名則又作側一名稷莊襄王初名異一作異人一作子異更名楚一作子楚始皇時稱楚曰荆避諱也史記始皇名政姓趙氏徐廣云政一作正宋衷云始皇以正月旦日生故名正也索隠云始皇生於趙故曰趙政或云秦趙同祖以趙城為榮故姓趙氏始皇有二十餘子長子扶蘇次子胡亥趙髙殺公子十二人其名俱無考惟李斯傳有公子髙上書於胡亥耳秦有辨士隠姓名遺秦將章邯書云李斯為秦王死廢十七兄而立今王是二世乃始皇第十八子也秦王子嬰二世兄之子始皇孫也趙髙傳以為始皇弟誤秦大夫公孫枝字子桑枝一作支公子華一作公子桑又作公子革百里奚史記奚作傒韓非子百作伯類解云其先虞人居百家里因以百里為氏孟明視西乞術白乙丙視術丙三人孟明西乞白乙字也唐表以視為奚之子又以術丙為視之子按吕氏春秋蹇叔有子曰申與視申即白乙丙視即孟明然左傳既言孟明西乞白乙又言蹇叔之子與師則吕氏誤穆王以造父為御离商為右次乗以柏夭主車參百為御奔戎為右見穆天子傳离音泰篆作商音丙石經作字林作西列子注云离即齊商即合古字也末審何據然淮南子云鉗且泰丙之御髙誘注云二人古之善御者泰丙即离商也鉗一作甘柏夭參百奔戎皆人姓名參百一作參伯奔戎一作賁戎列子云造父師泰豆氏泰一作太周書穆王臣君雅伯冏古文雅作牙史記冏作臩人表又作㷩集韻又作臦囧周昭王溺於江漢二女延姢延娛夾擁王身同溺姢一作媚娛一作嫵一作嬋周宣王封母弟友於鄭是為桓公桓公子武公掘突掘音鶻一作忽突譙周作突滑索隠作滑突然桓公之孫昭公忽厲公突祖孫同名故索隠又以掘突為武公字左傳鄭子儀世家儀作嬰悼公費一作㵒一作沸一作弗釐公惲一作髠原成公庶兄繻一作纒幽公弟駘是為繻公一作繚鄭君乙或作陽或作乙陽春秋鄭伯弟語公榖作禦左氏作子人杜注語字子人公孫段字子石一作伯石公孫楚字子南即㳺楚也㳺速字子寛子太叔之子也一稱罕渾國僑公孫僑也僑字子産諡成子杜云僑一名美左傳類解云字子美公子舒字子印舒一作愉公孫革乃公子然之子也是為然丹後仕楚楚人謂之鄭丹公孫揮字子羽揮一作翬祭仲足字仲名足為祭城封人杜云名仲足誤石㚟一作石孟㚟音綽孟其字也公子班字子如班一作般孔子字仲尼一作仲㞾孔子母顔氏徵在禱尼丘而生故以為名字史記云孔子生而首上圩頂故名丘張禹云仲者中也尼者和也言孔子有中和之德故字仲尼梁武帝亦以丘為聚尼為和並謬仲尼父叔梁紇叔字梁紇名故家語稱梁紇一云叔梁字紇名故左傳稱紇也叔梁紇娶魯之施氏生九女其妾生孟皮字伯尼是為孔子兄或云孟皮字也名貙按祖庭記闕里志孔子家譜家語俱不載葢後人見左傳宋司馬華貙字孟皮故疑孟皮名貙耳孟皮病足魯襄公十九年丁未叔梁紇求婚於顔氏二十二年庚戌十月庚子申時生孔子即今之八月二十七日也或云孔子生於二月二十三日非孟皮子名忠字子蔑一作子茂一作子蘉孔子娶宋开官氏开一作并孔子學於老𥅆孟蘇䕫靖叔見吕氏春秋逹巷黨人顔師古漢書注云項槖也此必有據古今幼悟絶倫者有三人蒲衣八歲而友舜睾子五歲而賛禹言項槖七歲而為孔子師家語史記載孔子弟子姓名不同公冶長字子長家語作公冶萇范甯云字子芝南宫适即仲孫閲也史記作南宫括家語作南宫縚公晳哀家語作公晳克漆雕開字子開史記作漆彫開家語云字子若巫馬施字子旗論語作巫馬期顔濁鄒孟子作顔讎由梁鯉字叔魚史記作梁鱣伯䖍字子析家語作子晳鄡單字子家一作鄔善句井疆一作鈎井疆秦商字子丕家語云字丕兹薛邦字徒史記云鄭國字子徒鄭薛字訛以邦為國避漢祖諱邽巽字子歛家語作邦選字子歛文翁圖作國選亦避漢諱原亢一作冗史記作原亢籍公孫龍家語龍作寵又按蓺文志有公孫尼子漢志以為七十子之弟子隋志即以為孔子弟子史記謂公孫尼子撰樂記馬總劉瓛又謂公孫尼子作緇衣其為孔子弟子無疑而史記家語皆不載元竊疑公孫尼子即公孫龍也龍尼字相近不然或龍名尼字耳申棖鄭𤣥云即申續也家語作申績史記作申黨後漢王政又作申棠棖續績黨棠本一人而唐宋加封以申黨申棖為二人猶琴牢琴張本一人而後世分為二人耳史記懸豐家語作懸亶字子象或云即禮記檀弓篇縣子也傳春秋榖梁氏名淑字元始一云名赤子夏弟子説苑子路門人成回一作承回嘉靖乙丑春元過庠宫見先賢神位有誤書姓氏者如奚容箴左人郢石作蜀叔仲㑹步叔乗皆複姓而神位祗稱奚子左子石子叔子步子考之儀注亦然始知此誤已乆元乃改題奚容子左人子石作子叔仲子步叔子其舊題木主制度不一又多殘缺元乃購新木依會典尺度製之請縣令復城楊公瑢奠安如禮孟軻魯孟孫氏之後漢書云軻字子車孔叢子作子居一作子輿又作子與軻父孟孫激公宜激名公宜字或云激公字宜名軻母仉氏梁四公子之後仉音掌軻娶由氏一作田氏生子孟仲子名睪嘗學於公孫丑故公孫子書有仲子問一篇朱子集註云仲子孟子從昆弟依趙氏説耳與孟氏譜異余嘗著孟子雜記載之詳孟子稱孟施舍宫之竒庾公之斯尹公之他施之二字語助辭如魯大夫孟側字子反左傳作孟之側論語作孟之反左傳又有晉大夫介之推舟之僑蔡大夫文之鍇楚大夫耿之不比文之無畏呉大夫文之儀齊大夫燭庸之越齊小臣石之紛如常之巫鄭人佚之狐燭之武魯人公罔之裘顔之僕晉美人南之威又莊子稱厲之人驪之姬吕覽稱董之繁菁丹之姬皆以之字發聲也孟子稱華周癰疽吿子華周人表作華州説苑作華舟周州舟音同字訛左傳作華還音旋周名還字也癰疽當作雍雎雍姓雎名一名渠衛靈公嬖閹也事見説苑蘇轍有辨而朱注以癰疽為瘍醫從趙岐之説然戰國䇿亦作癰疽蓋漢儒誤書耳告子趙注云告姓也名不害孫奭正義云趙以告子名不害者盡心篇有浩生不害疑為告子姓告名不害字浩生也然趙岐浩生注又云浩生姓不害名則浩生非告子矣不知趙注告子名不害何所考證又按薛氏四書人物考無告子豈以告子即浩生不害邪左國世本世紀年表人表諸書所載人名不同如仲雍作中雍仲忽作中䀜虢仲作虢中鬻熊作粥熊南宫毛作南宫髦曼伯作檀伯徐偃王作隠王仲山甫作中山父張仲作張中賔孟作賔猛曹莊公射姑作嚴公亦姑齊公子無虧作無詭安孺子作晏孺子公子壽作公子嘉公子固即公子成又作公子城徒人費作寺人費輪扁作輪邊邴歜作邴􅧬又作邴戎雍林作雍廩於陵仲子作中子薄疑作蕩疑闞止作監止閻職作庸職騶忌作鄒忌樂羊作樂陽魯苫越作苫夷微生畝作尾生畮微生髙作尾生髙佛肸作茀肸又作佛肹公肩假作公肩瑕公肩定作公堅定卞莊子作館莊子曹劌作曹沬又作曹翽又作曹􅀈闕黨童子作厥黨公輸班作公輸般又作公舒班又作公輸盤顔般作顔班榮啓期作榮聲期楚公子圍作公子回司馬子期作子綦費無極作費無忌祝聃作祝瞻景差作景瑳又作景慶椒舉作湫舉偪陽作福陽淖齒作卓齒又作悼齒鄭成公䎾作成公綸髙渠彌作髙渠眯傅瑕作甫瑕衛殤公剽作殤公焱蒯聵作蒯蕢式夷作視夷棘子成作革子成石團作石專又作石塼又作石曼專又作石姑專又作石曼姑專宋鈃作宋牼晉狐咺作狐爰舅犯作咎犯韓求伯作賕伯魏犨作魏讎屠岸賈作屠顔賈屠黍作堵黍竇鳴犢作竇鳴鐸即竇犨也舜華作慶華閻明作閻没冀缺作翼缺知果作知過豫讓作豫襄呉蹶由作厥由陳司徒苕作司徒招又作司徒昭趙仇液作祝郝又作杌郝公仲侈作公仲馮寧越作甯越又作寧經梁舍人馮喜作馮熹九方歅作九方臯或云臯名歅字陸通字接輿一作接與陳仲子字子終並見髙士傳荀子作陳仲説苑作田仲老子弟子尹喜庚桑楚喜字公度是為關令或稱關尹列子又稱尹生尹子庚桑複姓一作亢桑一作亢倉列子名禦寇一作圄寇列子師壺丘子友伯昏無人壺丘伯昏複姓壺丘子名林無人一作瞀人一作瞀人列子稱商丘開禾生子伯毛丘園恵盎楊布䚦俞商丘禾生複姓園一作圉恵盎恵施之族楊布楊朱之弟䚦俞古之聰耳人也一作裭俞列子稱雍門之人善歌哭戰國䇿云雍門子善鼓琴注云雍門名周又見説苑列子稱來丹之友申他一作申抱列子弟子伯豐伯一作百一作栢莊周字子休見續博物志莊注未載漢書王吉傳作嚴周莊子稱顔成子㳺南郭子綦將閭葂南榮趎注云顔姓子㳺字名偃成謚也南郭姓子綦名字子葵將閭姓葂名一云將姓閭葂名將一作蔣葂一作莬南榮姓趎名一云南姓榮趎名趎一作疇一作儔一作壽淮南子又作幬賈誼新書又作跦莊子稱紀渻子扁慶子谿工陽子居瞻子勝子東野稷市南宜僚相里勤紀扁谿陽瞻勝姓東野市南相里複姓渻一作消慶一作度谿一作雞陽子居名戎陽一作楊或以子居即楊朱之字瞻一作詹勝一作申稷一作畢市南宜僚即熊宜僚相一作襄莊子稱田侯牟越王子捜商太宰蕩門尹登恒大公任大公調則陽注云田侯牟齊威王名牟也按史記威王名因齊不名牟捜王子名一作翳蕩太宰字一作盈或云蕩名盈字門尹大公複姓登恒任調皆名或云門尹官名姓登名恒大公大夫之稱也則陽字彭陽一云姓彭名則陽莊子弟子蘭且蘭一作蕳一作藺墨子弟子禽滑釐滑一作骨一作屈釐一作黎慎子名到一名廣荀卿漢志作孫卿避宣帝諱荀卿傳云楚有尸子阿之吁子尸子晉人名佼秦商鞅客鞅死逃入蜀藝文志有尸子二十篇今云楚人未詳阿齊地吁姓名嬰藝文志有吁子十八篇别録又作芋子吕覽又作餘子荀子稱姑布子卿注云姑布姓子卿名一作布子卿無姑字或云姓布字子卿史記亦作姑布荀子稱楚之州侯秦之張儀可謂態臣州侯楚襄王佞臣見史記儀或作禄荀子稱唐鞅逐載子載一作戴或云即戴驩也荀子稱季恵恵指恵施季不知何指或云季真莊子謂季真之莫為者也或云季梁列子謂季梁楊朱之友荀子稱仲尼子弓學者不知子弓何人或云即仲弓也或云朱張字子弓皆非按漢書儒林傳江東馯臂字子弓嘗受易於魯之橋庇荀子師也荀子所稱子弓葢指馯臂耳荀子弟子陳囂李斯或云陳囂即它囂也按它囂楚人韓詩又作范囂與荀子不同時陳囂葢别是一人李斯上蔡人斯子由為三川守並為趙髙所殺由一作繇一作䌛太公六韜文師篇云文王將田史編布卜史記云西伯出獵卜之無史編名寗戚字戊淮南子云甯戊飯牛是也易牙即雍巫也雍人名巫字易牙古字雍饔通用賈誼新書作子牙杞梁左傳作杞殖中華古今注云杞植字梁植殖古字通用故左傳學猶植也亦作殖樂府有杞梁妻歌乃杞梁妻妹朝日悲其姊子賢貞操作歌名曰杞梁妻晉文公臣介子推即介推也一作介之推琴操作介子緩仙傳云介子推姓王名光謬説苑云介子推行年十五而相荆葢寓言也或别是一人趙簡子臣王良一云郵良一云郵無䘏字伯樂一云字子期郵其采邑一云伯樂孫陽字也何燕泉序録云天文伯樂星主天馬孫陽善御故稱焉伯樂非孫陽字也或以王良孫陽為一人或以為二人王良亦星名漢文帝在代邸時有來宣善御亦號王良趙簡子名鞅一名志父左傳楚滅頓以頓子牂歸又云晉人執戎蠻子赤歸於楚公羊牂作牄蠻作曼沈子逞穀梁逞作盈公羊又作楹左傳司城子罕姓樂名喜史記鄒陽獄中上書云宋聽子罕之計而囚墨翟齊用越人蒙而彊威宣子罕漢書作子冉文頴云子冉即子罕也然子罕與墨翟不同時疑漢書子冉為是子罕子冉葢二人越人蒙漢書作子臧張晏云子臧或越人蒙字也然越人蒙未見闕左傳臺駘人名而禮記敗於臺駘地名也臺音胡故吕覽作狐駘正韻云臺即古壺字管子稱東郭牙晏子春秋稱北郭騷吕氏春秋稱東郭蹇左傳國語無此名吕覽稱墨者有鉅子腹鞟注云鉅姓腹鞟字或云腹鞟名也吕覽稱田嬰臣劑貌辨齊湣王臣公玉丹劑貌公玉複姓辨丹名丹一作冉吕覽稱齊宣王臣能意湣王臣狐援能狐姓意援名能奴代切去聲吕覽稱大撓作甲子黔如作虜首竊疑虜當作慮慮筭也謂黄帝臣𨽻首作筭數也字句有訛吕覽秦有墨者唐姑果淮南子果作梁劉向説苑作唐姑虞卿史記不詳其姓名惟云虞卿㳺説之士説趙孝成王為上卿故號虞卿譙周注云為卿食邑於虞故有此號是虞非姓卿非名也猶秦始皇本紀有麃公為將軍索隠注云麃邑公史失其姓名耳或以麃公為姓名亦非虞卿傳趙郝一作趙赦蘇秦周大夫忿生之後譙周云秦兄弟五人秦最少字季子索隠云其嫂呼小叔為季子耳未必其字也秦兄代代弟厲更有蘇辟蘇鵠並為㳺説之士出典畧而史記則云秦兄弟三人秦弟代厲與蘇氏譜異厝毛蘇代之後春秋後語作厝毛壽韓嬰作潘壽史記作鹿毛壽國語作唐毛壽楚公子貞字子囊其孫名瓦字子常史記伍子胥傳楚昭王使公子囊瓦將兵伐呉誤書也孟嘗君田文父靖郭君田嬰文襲父封薛號孟嘗孟字嘗邑名或作常史記云薛公文䘚諡為孟嘗君恐非孟嘗君傳齊相親弗親姓弗名也戰國䇿作祝弗平原君傳李談季布傳趙談司馬遷避太史公諱改曰李同趙同古韻談同一音遷非茍改者王羲之祖諱正杜甫父諱閑二公臨文多更本字信陵君傳晉鄙如姬晉姓鄙名為魏將如姬魏王寵妾姓如趙封樂毅於觀津號望諸君戰國䇿望作藍趙以尉文封亷頗為信平君徐廣云尉文邑名或云尉官名也文人名也謂以尉文所食之邑封頗也漢書表有尉文節侯尉文在南郡去趙逺徐説未是趙將龎煖索隠云龎煖即馮煖一作馮驩蔡澤傳唐舉荀卿書作唐莒荆軻本齊人徙於衛衛人謂之慶卿又逰燕燕人謂之荆卿荆慶音相近卿字也名軻古有勇士成慶見淮南子及漢書廣川王傳晉灼以成慶即荆軻非也成慶一作成荆一作成羌荆軻傳葢聶鞠武夏無且蓋鞠夏俱姓聶武無且名鞠一作麴無且一作亡趄燕太子丹客夏扶宋意武陽皆勇士扶一作拱意一作章髙漸離變姓名為人傭保匿於宋子髙姓漸離名宋子邑名非人姓也漢書㳺俠朱家朱姓家名聶政姊榮一作嫈史記秦將尉斯離王齮涉閒注云尉斯複姓非也尉秦官斯姓離名齮一作齕一作騎涉姓閒名閒一作簡一作蕳秦本紀丞相綰御史大夫刼綰姓王刼姓馮秦恵王使到滿助魏攻燕到姓滿名滿一作蒲始皇丞相隗林索隠云隗姓林名林一作狀顔之推云隋開皇初京師穿地得鑄秤權有銘云始皇量器丞相隗狀王綰列名王劭云狀字有證指此樗里子傳秦客㳺騰一作㳺勝甘茂傳蜀侯煇范蜎公孫奭煇乃秦公子名封蜀者也華陽國志煇作暉范蜎徐廣云一作范蠉戰國䇿又作范蝝公孫奭戰國䇿作公孫衍甘羅傳張卿即張唐也唐名卿字范雎傳文子謂田文也猶戰國䇿謂田盻田嬰為盻子嬰子也穰侯魏冉傳仇液客宋公戰國䇿作宋交又云齊人攻衛殺子良戰國䇿作齊人攻燕殺子之犀首傳李伯或云人名或云邑號戰國䇿作李帛樗里子名疾號智囊秦恵王弟樗一作㯉紀年又作楮商君傳甘龍孟蘭臯甘孟姓龍蘭臯俱名聶政傳嚴仲子名遂仲其字也蒙恬傳御史曲宫曲姓宫名或作曲官非智伯伐仇猶仇猶臣赤章曼支諫不聽因㫁轂而馳詳韓非子赤章姓曼支名曼一作蔓今楚俗稱人急遽自是者曰赤章冒支葢本諸此曼訛為冒耳仇猶吕覽作夙繇淮南子作仇由戰國䇿作厹由路史作仇吾史記楚懷王佞臣公子蘭嬖后鄭袖風俗通作公子簡戰國䇿作鄭褏戰國有封邑者即以邑稱君如四豪之類是也魏安釐王有幸姬號龍陽君蓋以龍陽為幸姬食邑或云猶秦稱華陽夫人云爾他國幸姬稱邑君者鮮左傳襄十九年齊侯娶於魯曰顔懿姬無子其姪鬷聲姫生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子仲子曰不可注云顔鬷姓懿聲諡稱姪者鬷姬蓋顔姬之媵也諸子衆妾之號管子所謂中婦諸子是也仲子戎子即衆妾之稱或以為姓非韓姬殺其君悼公韓姬韓大夫韓姓姬名姬一作玘一作起齊芮子生荼荼號晏孺子芮子景公嬖妾荼之母也一作鬻子韓姬似女稱芮子似男稱韓愈送何堅序云何與韓同姓而近按鄧名世姓氏辨證云何氏出自姬姓食采韓原為韓氏韓王建為秦所滅子孫散居而江淮間以韓為何隨聲變為何氏然史記韓王失國者名安此云建乃齊王名也鄧誤書耳史記楚將唐昧荀子作唐蔑説苑萊不用子猛而齊并之荀子作子馬陳涉傳蔡賜周文伍徐董緤蔡賜一作蔡陽周文即周章也伍徐漢書作伍逄董緤一作董絏漢書貨殖傳烏氏蠃烏氏姓蠃名氏音支又有佗羽公子佗姓羽名字公子佗一作他鏌耶干將世稱古劒名呉越春秋云呉王闔閭使匠干將造劒劒有二狀一曰干將一曰鏌耶鏌耶干將妻名也索隱云鏌耶干將二匠名鏌一作莫耶一作鎁屈原楚詞云朕皇考曰伯庸肇錫予以嘉名稱嘉名自原始夫三代尚實行命名雜亂不擇美辭後世士以名相髙名美而人才益卑試以三代名不嘉者紀一二于後靡弱顚夭尫瘠涅溷皆不振之辭也夏少康時有伯靡春秋傳周有辛由靡晉有梁由靡宋有華弱晉有士弱齊有髙弱國弱晏弱邾有丘弱秦有頓弱周有太顚閎夭柏夭魯有曾夭楚有潘尫魯有郈叔瘠周幽王名涅宋有樂溷晉有杜溷羅燬溺頽缺蔑没吁哀無宇無丕皆敗亡之辭也衛文公名燬陳哀公名溺衛有公子溺周有王子頹又有頽叔衛有公孫頽晉有郤缺士缺魯有樂師缺周有單蔑魯有仲孫蔑鬷蔑鄭亦有鬷蔑晉有先蔑士蔑周有王孫没晉有閻没衛有州吁穀梁作祝吁夏禹臣有郭哀魯有公晢哀齊有陳無宇楚有申無宇齊有髙無丕乞匄買貸購跪囏難皆匱窘之辭也齊有陳乞衛有駟乞石乞楚亦有石乞晉有郤乞周敬王杞孝公俱名匄宋有張匄晉有士匄楚有陽匄屈匄許悼公名買衛有石買楚有蒍買魯有梁買子齊康公名貸莊公名購宋悼公名購由周有祝跪又有原公子跪尋衛有甯跪楚有申叔跪周懿王名囏楚有堵敖熊囏魯有孟孫難晉有劉難惽頑疵戾非愆戯舞奢侈蕩佚突忽詭錯剽劖狂忿無駭無恤皆不檢之辭也陳有季子惽鄭僖公名髠頑周有太師疵楚有執疵晉有鬷戾周之先世有公非秦之先世有非子孔子弟子有秦非荀卿弟子有韓非周有單愆期宋有豐愆夏桀臣有大戲魯懿公名戯蔡哀侯名獻舞趙有趙奢楚有伍奢晉有魏侈宋有公子蕩楚有屈蕩周有史佚仲突仲忽鄭昭公名忽厲公名突齊有召忽晉有羊舌突晉獻公名詭諸又有夷詭諸齊有公子詭晉出公名錯齊秦俱有司馬錯衛殤公名剽又有公孫剽宋有皇劖般楚熊繹之父名狂周有蘇忿生魯有展無駭晉有范無恤又有郵無恤仇惡反側逆忌悍驁强梁無知皆不順之辭也晉文侯名仇魯有叔孫州仇衛襄公名惡魯有公子惡鄭有孫惡宋有戴惡楚有陽惡衛有齊惡魯有孟之側字子反楚有公子側字子反齊有陳逆周有隂忌虢公忌父周公忌父宋有公孫忌呉有公子慶忌齊有騶忌田忌楚幽王名悍齊平公名驁秦有蒙驁衛有强梁齊有公子無知累縶糾絞覊鞅挐掩穿犯髠黔皆罹咎之辭也夏有劉累韓有俠累呉有太子終纍衛有公孟縶衛昭公名糾齊有公子糾宋有公孫糾鄭有雍糾周有原伯絞魯有子家覊衛有孔羈曹有公子羈釐負羈楚有熊負羈魯有叔鞅齊有諸御鞅晉有范鞅趙鞅越有諸鞅秦有商鞅莒有大夫挐楚有蒍掩邾莊公名穿晉有趙穿韓穿魯有侯犯晉有舅犯鄭有徐吾犯魏有馬犯宋有樂髠齊有淳于髠衛有公子黔蘧蒢不能俯也朱儒短形也邾文公名蘧蒢郕太子名朱儒黑肩黑肱黑臂黑臀黑要與腰同黒卵醜形也周有周公黒肩魯成公名黒肱鄭有公孫黑肱楚有公子黑肱邾有大夫黑肱衛有子叔黒臂晉成公名黒臀楚有連尹黒要魏有黒卵見列子兒童豎僕卑屬也負芻賤役也齊襄公名諸兒潞子名嬰兒晉有胥童齊有髙豎魯有冉豎周之先世有皇僕魯有顔之僕晉有先僕曹成公名負芻楚王亦名負芻妵婼嫳嫗媛娥女婦之稱也宋有華妵魯有叔孫婼韓哀侯少子名婼齊有盧蒲嫳陳有夏嫗夫嫗或作彄孟子有馮婦孟嘗君傳有馮媛列子有韓娥缾竈杵臼小民日用器也魯有臧缾周有威公竈鄭有禆竈陳有公孫竈齊有司馬竈秦有客卿竈周平王晉靖侯俱名宜臼楚有屈宜臼陳宣公宋昭公齊景公俱名杵臼虺蠆毒䖝也商有仲虺魯有叔孫虺宋有蕩虺齊有孔虺鄭獻公名蠆齊有公孫蠆字子尾鄭有公孫蠆字子蟜蚠鼃蠅蜎蛾蠋蠡蠹蟜貂蟣虱微䖝也周有劉獻公子伯蚠楚熊眴號蚡冒齊有蚳鼃列子有甘蠅善射為逄蒙師楚有公子蜎老聃弟子蜎淵其後也藝文志作蜎蜵史記慎到傳作環淵晉有蛾析韻書蛾音蟻齊有顔蠋越有范蠡呉子名蠹秦有章蟜成蟜齊有勃貂豎貂燕有繆蟣韓有公子蟣虱鯉鰌鮀魴鱣䱸鱓鮒魚也鱗魚甲鰓魚頰也魯有孔鯉周有景鯉衛有公子鱄史鰌祝鮀髙魴晉有欒魴士魴孔子弟子有梁鱣韓有將軍䱸晉莊伯名鱓宋厲公名鮒晉有羊舌鮒魏有屈侯鮒宋有公子鱗漢初有戚鰓狗彘豷豨羔羊羯羻犂牛牼犢犨騅駒騧獸畜也狅犬奔獳犬驚也衛有史狗晉有新稚狗魯有武伯彘寒浞子名豷一作􅜦漢初有陳豨一作狶衛有髙子羔魏有樂羊子魯有仲孫羯陳桓公子名羻邾子名倪犂晉有伯州犂宋有樂祈犂魯有冉牛豎牛宋有司馬牛司寇牛父南宫牛司馬牼華牼孟子稱宋牼一作宋鈃晉有竇鳴犢卻犨騅􅀈齊有綿駒萊駒魯有公子駒楚有景駒晉有魏駒周有季騧莒子名狅晉景公名獳鄭有侯獳衛有獳羊肩虎豹熊貙狐狸麋麇玃狼麑犖犀駱野獸也舜有伯虎孔子弟子亦有伯虎齊有髙虎鄭有罕虎陳有慶虎魯有陽虎晉有韓虎舜有叔豹魯有單豹齊有王豹田豹晉有斐豹奜音飛宋有華豹魏有西門豹舜有仲熊楚有鬻熊宋有華貙周有王子狐鄭有佚之狐晉有解狐董狐舜有季貍一作狸古有醜人犨麋宋有皇麇楚有郟敖熊麇或作麏麕邾定公名玃魯有仲孫玃晉有狼瞫鉏麑魯有圉人犖楚有田犀齊有公子駱鄭有王孫駱雎鳩鴻鵲鵞䳒鴦禽也齊有雍雎魏有范雎商有汝鳩周有泠州鳩衛有鴻聊魋秦有扁鵲莊子有瞿鵲子魯有榮駕鵞鼓子名䳒鞮韓有暴䳒或作鳶周宣王時有牧人梁鴦魯公名禽又有展禽呉子名禽處西漢人名不嘉者如梁㳟王舂陵節侯栢鄉戴侯乗氏侯四人並名買江都易王非膠東康王寄桑丘侯寄生河間共王不周成頌侯得疵棗原侯妄得羽侯棄距陽侯匄路陵侯童挾節侯豎一作竪管侯戎奴陽山侯買奴臨朐夷侯牟平節侯並名奴魏其質侯蟜雷侯豨桃侯狗尉文侯犢文武功臣有陳買張買任敖張敖公孫敖丙猜許猜溫疥酈疥許瘛衛胠徐厲耏跖鄧弱須無吕馬童陳夫乞王棄之楊僕召奴趙棄奴公孫戎奴髙不識嚴不識周竈夏侯竈名疑卷二
