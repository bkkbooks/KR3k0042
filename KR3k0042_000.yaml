body:
  text: 名疑類書類提要臣等謹案名疑四卷明陳士元撰是書上自三皇下迄元代博採史傳及百家襍説凡古人姓名之異字及更名更字與同姓名者皆彚萃之其所徵引較之各姓氏書頗為詳備如洞神部載三皇姓名列仙傳稱介子推姓王名光之類皆指其謬又據史記佞幸傳辨朱建傳誤閎孺為閎籍孺據顔延之誄辨陶徴士本名淵明字元亮皆為確鑿然以司馬遷諱談為同謂談一音同以童烏為揚雄小字又謂雄本姓楊字訛為揚字之類訛誤者亦復不少又神仙鬼怪之名如呉剛姮娥豐隆屏翳神荼欝壘等皆詳載之體例頗為冗襍又不著所出不盡可以徵信特其採摭繁富頗有足資参證者固不妨存以備考焉乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀名疑原序海宇之廣齊民林總不可勝計雖僻壤遐陬生同時者奚翅億萬數哉䆳古之代書契未立莫之稽已三五以來史牒所載姓名無論賢愚或億萬數中僅存一二乃又傳録謬訛可嘅也余讀史又博觀百家雜説凡古人姓名異同輒記手簡以備質問乆之成帙用示塾童題曰名疑仲尼曰多聞闕疑余非多聞者也其不能闕疑也亦不免玩物喪志之誚也與隆慶己巳上元日陳士元書
