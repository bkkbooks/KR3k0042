body:
  text: 名疑卷四明陳士元撰古今姓名同者甚多如唐堯虞舜二帝也漢書有唐堯為臨武長梁書有虞舜為太常丞夏后啓商湯二王也呂氏春秋有夏后啓乃鄒公之子與白公同時元魏書有商湯乃商疑式之孫箕子比干二忠臣也前漢王侯表中山孝王之子名箕子元魏列傳有吉陽男名比干曽參顔回二賢人也魯有曽參殺人晉書有顔回為羌帥况其他乎故羅泌云古今姓名同者劉𢎞王褒俱十有一張良有九張敞王吉俱十有八不可不辨古帝有庸成氏黃帝臣亦有庸成少昊白帝曰朱宣氏唐亦有濮州刺史朱宣伏羲臣有巫咸商大戊時亦有巫咸伏羲妹女媧禹娶塗山氏亦名女媧神農時有赤松子黃初平亦號赤松子黃帝臣有風后夏禹時亦有風后黃帝臣有張若秦始皇時亦有蜀郡太守張若黃帝臣有離婁殷時亦有離婁三國時亦有離婁見管輅傳黃帝臣有扁鵲善醫戰國時亦有秦越人號扁鵲善醫黃帝臣有伍胥楚平王時亦有伍胥黃帝史官孔甲夏后亦有孔甲孔子八世孫鮒亦曰孔甲后稷之生也始棄之因名曰棄功在萬世宋芮司徒之生女也始棄之亦名曰棄幾危宋國帝嚳臣名羿有窮之君亦名羿俱以射稱少昊子名班魯人亦名班俱以巧稱帝嚳孫彭祖元季亦有廬州妖人彭祖黃帝元妃西陵氏第三子名龍苗夏少康第三子亦名龍苖顓頊號髙陽夏后扄亦號髙陽商有牧正趙隱元魏有祕書監趙隱唐有宰相趙隱桀桀臣有左師觸龍秦紀亦有左師觸龍湯臣有女鳩周宣王之妾亦有女鳩周公之子伯禽唐李太白之子亦名伯禽春秋有逸民朱張後漢亦有朱張字孫卿春秋鄭有兀者申屠嘉漢書文帝時有丞相申屠嘉春秋晉有荀彘漢書武帝時有左將軍荀彘春秋齊有王豹前漢功臣表亦有王豹晉書又有王豹戰國趙有王良後漢書亦有王良春秋隨有季良而七國魏亦有季良衛有太子蒯瞶刺客傳亦有趙人蒯瞶兩司馬喜一戰國中山相一漢司馬遷之大父三召平一齊相一秦東陵侯一漢初廣陵人春秋魯有秋胡前漢亦有杜陵人秋胡楚屈原姊名􅎐漢呂后妹亦名􅎐魯有魯班而三國吳王長女亦名魯班戰國有兩毛遂西京雜記云野人毛遂墜井而死客以告平原君平原君曰嗟乎天喪豫矣既而知非平原君客齊有孟嘗君田文魏相亦有田文後漢亦有合浦太守孟嘗孔子弟子有公孫龍平原君客亦有公孫龍齊人公孫𢎞與孟嘗君同時見戰國䇿及吕氏春秋漢武帝時公孫𢎞封平津侯又明帝時有幽州從事公孫𢎞交通楚王英見虞延傳齊襄王時有太史嬓又有勇士太史嬓一作噭齊公吕望號太公田和亦號太公列仙傳有成周時仙人浮丘伯漢書楚元王傳有孫卿弟子齊人浮丘伯以詩授魯穆生秦昭王時有五校大夫王陵漢髙帝功臣亦有安國侯王陵趙將有扈輒而漢初張耳將亦有扈輒六國時有樓緩而前漢淮南王臣亦有樓緩史記秦末有田疇三國志魏亦有田疇漢初有兩韓信一封淮陰侯一封韓王未幾即為降虜前漢兩貢禹一為髙帝謁者一字少翁元帝時御史大夫前漢兩呂嘉一呂台子封常山王見呂后傳一封臨蔡見南越傳前漢兩韓安國一武帝時御史大夫拜護軍將軍自有傳一元帝時定襄太守拜建威將軍見馮奉世傳兩王商皆成帝時人一為相一為大司馬漢武帝時朱買臣為㑹稽太守梁元帝時亦有朱買臣為武昌太守漢武帝時有江都相董仲舒南齊巴東王子響為荆州刺史亦有直閣將軍董仲舒譙秀蜀紀載蜀之八仙亦有董仲舒前漢宣帝時丙吉為丞相後漢安帝時丙吉為太子廚監前漢兩張禹一字長子為御史大夫與蕭望之同時一字子文元帝時詔傅太子成帝時為丞相封安昌侯後漢張禹字伯達和帝時為太傅安帝時以定䇿功封安鄉侯前漢兩王莽一天水人字稚圭昭帝時為右將軍與霍光同心輔政一即新莽篡漢者王莽四輔有劉秀為國師封嘉新公與光武同姓名光武未起兵時與姊夫鄧晨俱過蔡少公家少公學圖讖言劉秀當為天子或曰是國師劉秀乎光武戲曰何以知非僕耶坐者皆大笑又漢有侍中奉車都尉校定山海經陳振孫云此劉秀即歆也歆初名秀後漢兩王郎一邯鄲人詐稱成帝子輿為光武所誅一東海人字仲子後漢兩鄭衆一興子字仲師一宧者字季産路史發揮云漢兩龔遂俱為郡太守兩京房俱明災異漢有荆州太守巨武秦苻堅將亦有巨武漢孔安國孔子十一世孫治古文尚書武帝時諌議大夫晉孔安國字安國愈之子為尚書左僕射晉右軍王羲之苻堅之將亦有王羲之晉侍中張華慕容垂之將亦有張華晉李密字令伯一名䖍唐李密字𤣥邃一字漢臣元史又有北海盜李密晉王肅字子雍元魏王肅字子恭晉張載字孟揚一作孟陽宋張載字子厚晉葛洪字稚川宋葛洪字容父晉兩劉毅一字仲雍武帝時為尚書左僕射一字希樂與劉裕起義兵討桓𤣥為豫州刺史晉兩周撫一為彭城內史以反誅一為王處仲將有傳晉兩孫秀一為吳降將見賈充傳一為趙王倫嬖人見陶侃傳晉兩解系一自有傳一見陶璜傳晉兩周訪列傳云時有與訪同姓名者罪當死吏誤收訪訪奮擊之吏皆走巵言云南朝有兩劉琨文人有兩王褒兩蘇子卿唐兩韓翃皆文宗時人一知制誥一為太守帝書翃寒食詩春城無處不飛花一絶句云與此韓翃唐兩李光進一光弼之弟一光顔之兄皆為名將秉節鉞唐兩李珏列仙傳云李玨出相節制淮南時江陽部民亦有李珏列名洞府唐兩李益列傳云憲宗時益為集賢殿學士時又有太子庶子李益同在朝故世稱文章李益以辨云唐王圭字叔玠為宰相諡曰懿宋有兩王圭一字禹玉左僕射諡文公一為光祖之父涇原勇將號王鐵鎗唐徐績字懋功宋徐績字元功唐張齊賢陜州人諌議大夫宋張齊賢曹州人左僕射唐有嶺南節度使蔡京宋有丞相蔡京唐郭震字元振魏州人宋郭震字希聲蜀人唐香山九老㑹有兩盧正一侍御史一河南尹五代梁有王彥章吳亦有王彥章宋兩張觀一字思正絳縣人吏部侍郎兼御史中丞卒贈吏部尚書諡文孝一字仲賓毗陵人度支判官廣南西路轉運使並仁宗時人宋兩孫益一揚州泰興人紹定中李全犯揚州縣令王爚益拒賊戰死一不知何許人宣和末知寧朔府救太原戰死二人並見忠義傳宋兩王延德一開封人溫之子授平州防禦使一大名人授左千牛衛上將軍宋兩黃震一字伯起一字東發宋兩王著一字成象單父人翰林學士一字知微渭南人殿中侍御史宋兩王繼勳各有傳一陜州平陸人授磁州團練使一外戚彰德節度饒之子孝明皇后同母弟也元兩張榮一靖州人一濟南人金有郝天挺字晉卿元亦有郝天挺字繼先仙傳兩尹公度一名喜一名軌或云尹喜一字公文仙傳有王喬而曹魏時亦有王喬見魏明帝賜曹幹璽書程叔子號伊川而邵康節之父名古字天叟亦號伊川見陳繹所撰邵處士墓志黃淵撰愚丘記云經世觀物吾不如伊川丈人謂邵古淵初名仲元字善甫號四如居士宋亡乃更名淵亦字天叟號韻鄉聱翁晚年又號彥安余嘗讀厯代史傳見陳姓輒記之有四陳忠一寵子字伯始漢尚書令一諶子漢青州刺史一穎川人唐宰相夷行之祖一宋末寧晉人學徒私諡茂行先生元左丞祜之祖三陳崇一漢平帝時南鄉侯一伯宣子唐江州刺史一隱子宋崖山令三陳孚一字剛中臨海人國史院編修一湘陵人上舍及第一瓊山人舉進士三陳元一河陽侯涓之五世孫漢即丘公士一厭難將軍欽之子字長孫仕莽為郎一字伯元元至正中進士道州録事參軍三陳咸一萬年子字子康漢尚書令莽召為掌寇大夫不應一升卿子字逢儒宋司農少卿諡勤節一越兄宋寶謨閣待制三陳泰一羣子字立伯漢穎陰侯諡穆一義門兢弟一字同志茶陵人宋進士及第三陳欽一尚書令咸之子不仕莽一廣信人字子佚莽從受左氏春秋仕莽為厭難將軍一思讓子後周長州長史三陳敏一字令通晉惠帝時右將軍一皓子宋武功縣男宣州觀察使一無錫人宋台州守三陳光一實子一子昂子唐商州刺史一汲縣人宋壽陽尉兩陳千秋一安子漢槀侯一紀信侯倉之裔漢長安公士兩陳夷行一字道周唐左僕射一公輔子宋進士兩陳嬰一軫子秦東陽令漢堂邑侯一鍇子漢槀侯諡節兩陳願一恆子一伯周子唐萬州刺史兩陳清一願子一嶨子兩陳察一願子一元基子唐文州刺史兩陳䕫一實子一天祐子兩陳洽一實子一後主叔寶子兩陳恂一泰子漢穎陰侯一布亮子宋大理丞兩陳凖一佐子字道基一篆子與朱文公友善兩陳康一漢魏郡太守一達子晉丞相掾兩陳髙一鼎子齊散騎常侍一保子宋莆田人學徒私諡靖逸先生兩陳遵漢書陳遵字孟公豪俠所在人懷之惟恐後時列侯有同孟公姓名者孟公每至門人曰陳孟公座中莫不振動既至而非孟公因號其人為陳驚座兩陳蕃一字仲舉漢太傅封髙陽侯一伯仁子隋資陽令兩陳褒一霸先族弟封鍾陵侯一京從子唐鹽官令兩陳翔一珍子字子麟漢御史中丞一省華祖五代時蜀新井令兩陳璿一酆子唐渠州刺史一宋宜城令兩陳瓉一酆子唐黔州刺史一文龍從子宋季起兵死難兩陳悝一買子漢曲逆侯一騫兄咸寧初太尉兩陳竒一棘蒲侯武之子一元魏河北人字修竒兩陳卓一居仁子字立道宋樞密院蘞書諡清敏一咸寧人有至行兩陳武一漢髙祖功臣棘蒲人一廬江人字子烈吳偏將軍兩陳英一康子晉盱貽太守一若拙子宋奉禮郎兩陳鳳一户牖侯平之裔漢平帝時爵關內侯一平帝時中郎將與王惲等出使有功封盧鄉侯兩陳僑一費侯賀之曽孫漢茂陵上造一仕莽稱白虎公兩陳粲一秪子漢關內侯一本子漢東鄉侯兩陳靖一光武時散騎常侍封餘干侯一仁璧子字道卿宋太僕卿兩陳嘉一復陽侯胥之子嗣爵諡共一棘蒲侯武之曽孫漢雲陽上造兩陳碩一桐廬人吳封富陽侯一襄安人峴之兄兩陳琳一廣陵人字孔璋魏軍謀祭酒一宜城人曄從兄兩陳峴一碩子陳譙州刺史一禮部侍郎桷之孫宋中書舍人兩陳起一蘄春人南唐監察御史一沅江人宋永州倅兩陳琰一字玉伯宋殿中侍御史一字中叔宋閣門使兩陳繹一叔明孫唐侍御史一字和叔宋集賢院學士兩陳規一字元則安丘人宋德安守一字正叔稷山人金右司諌兩陳充一字若虛宋殿中丞一文毅公亮之弟兩陳遘一字亨伯宋資政殿學士一翰林待制孚之子元浙江行省左右司員外郎兩陳祗一汝南人字奉宗漢侍中諡忠一叔寶子字承敬封信義王入隋為通議郎兩陳兢一叔寶子字承檢封邵陽王入隋為國子監丞一義門鴻之弟史傳有祖孫兄弟同名字紀一二於左少昊名摯其孫顓頊之子亦名摯是為帝摯湯名天乙紂父亦名天乙湯長子名太丁武乙之子亦名太丁周仲雍曰虞仲仲之裔周章孫亦曰虞仲蔡文侯名申其𤣥孫昭侯亦名申魯莊公之孫仲嬰齊仲字嬰齊名也而文公之孫亦曰公孫嬰齊仲嬰齊者從祖也又同時魯孟孫氏之後有公孫宿季孫武子亦名宿宋兩公子朝皆曰宋朝一為司寇乃桓公弟一出奔仕衛論語宋朝之美是也衛穆公名遫其裔孫成侯亦名遫鄭公孫段字子石而印段亦字子石乃公孫段從父之子也鄭公子嘉字子孔公子志士亦字子孔晉范宣子士丐其同族伯瑕文伯亦曰士丐楚公子申字子西乃平王子昭王兄也又有右司馬公子申而鬬宜申又字子西楚有公子啓而公子元之子亦名啓楚屈氏有兩屈蕩前漢書王侯表氏丘侯名偃楊丘侯亦名偃皆齊悼惠王之孫皆文帝十六年封平的侯名利親劇魁侯亦名利親皆菑川懿王之後金鄉侯名不害就鄉侯亦名不害皆東平思王之孫皆以元始元年二月丙