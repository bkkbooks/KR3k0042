尊吕巖字洞賓初名紹先更名巖洞賓師鍾離權字寂道號雲房一云字執柄一云字雲房洞賓弟子盧生名英何仙姑姓趙名何一作和韓湘字清夫一字伯渚或作北渚訛清父名老成祖名介文公愈之親兄湘本愈姪孫而集仙傳云愈之猶子非南嶽鄧先生名郁字彥達麻衣子姓李名和天門子姓王名經通微子姓楊名什伍神和子姓屈突名無為𤣥真子姓張名志和達觀子姓李名筌一作荃抱朴子姓葛名洪字稚川金華子姓劉名崇逺清虛居士姓王名鞏字定國無盡居士張商英也焦光字孝然光一作先殷七七名文祥一云名道筌王子芝字仙苖子一作紫世傳月中斫桂吳剛字質故李賀云吳質剛一作罡史記封禪傳有宋母忌樂彥引老子道經云月中仙人宋母忌也白澤圗又以宋母忌為火仙淮南子云羿請不死之藥於西王母羿妻姮娥竊以奔月羿為帝嚳臣非夏時羿也姮娥羿妻名一作嫦娥或云嫦娥字純狐則又以為夏羿妻矣黃庭經云髙奔日月吾上道鬱儀結璘善相保注引上清紫微文云鬱儀奔日之仙結璘奔月之仙此語亦見雞跖集結璘韻府作結儀竊疑姮娥結儀之說俱妄或因尚儀占月而訛耳楚辭注云豐隆或曰雲師或曰雷師屏翳或曰雲師或曰雨師或曰風師按歸藏云豐隆筮雲氣而告之則雲師也穆天子傳云天子升崑崙封豐隆之葬郭璞注云豐隆筮師御雲得大壯卦遂為雷師淮南子云季春三月豐隆乃出以將其雨張衡思𤣥賦豐隆軒其震霆雲師􅞝以交集則豐隆雷也雲師屏翳也天問曰萍號起雨則屏翳雨師也洛神賦云屏翳收風則風師也淮南子云雨師灑道風伯掃塵說者以為箕畢二星列仙傳云赤松子神農時為雨師風俗通云𤣥冥為雨師其說不同據楚辭則以豐隆為雷師飛廉為風伯屏翳為雨師西王母者九靈太妙龜山金母也一號太虛九光龜臺金母元君或云姓焉氏雲林夫人王母第十三女名媚蘭紫微夫人王母第二十女名玉清娥一云名青娥字愈意雲華夫人王母第二十三女名瑤一云名瑤姬太真夫人王母之小女名琬字羅敷王母有三鳥使者一曰大􅝼一曰小􅝼一曰青鳥如此類者誠哉荒唐之言上元夫人者三天真君之母紀總仙籍亞於王母其侍女名阿環樊夫人名雲趐劉綱之妻東陵聖母姓杜師事劉綱衛夫人名鑠字茂漪南嶽魏夫人晉司徒舒之女劉幼彥之妻名華存字賢安號紫虛元君又稱黃庭君諶母許真君師也名嬰一作嬰許真君名遜字敬之九華真妃太𤣥上真元君李夫人之少女姓安名鬱嬪字靈蕭太𤣥女姓顓頊名和毛女名玉姜燕昭王時有𤣥天二女善舞一名旋波一名捉淡出王子年拾遺捉琰杜陽編作搖光女仙又有成公智瓊許飛瓊李真多楊敬真曽妙典錢妙真王妙想杜蘭香段安香黃觀福黎瓊仙董上仙王子登謝自然楊正見張連翹戚逍遙安法興張玉蘭邊洞𤣥崔少𤣥裴𤣥靜戚𤣥符薛𤣥同盧眉娘曹文姬萼緑華婉陵華盱母梁母麻姑郝姑龎女褒女明星玉女雲臺玉女殷女昌容秦女弄玉之類成公復姓萼緑華姓楊或云即九疑山羅郁甘氏星經云太白上公妻號女媊居南斗媊音前甘氏者即甘公善說星者也天官書云齊甘公藝文志云楚甘公齊楚不同未知孰是劉歆七略云甘公一名德石氏亦有星經石氏者魏之石申父也後漢書作石申夫梁玉清織女星侍兒也秦始皇時太白星竊玉清逃入衙城小仙洞十六日不出天帝怒謫玉清于北斗下玉清有子名子休配河北行雨每至小仙洞恥母淫奔之所輒回故其地少雨見李元獨異志甚誕世傳伏羲妃死為洛神如淳注漢書以為伏羲女世傳湘妃神乃堯之二女舜之二妃從南巡而溺死湘江故屈原九歌有湘君湘夫人鄭𤣥張華輩斷以為舜妃羅泌又以為舜之二女曰霄明曰燭光第三妃登比氏所生也靈照百里處於湘江為神迄今有分風送客之異宵一作肖山海經比作北登封有啓母石應劭郭璞輩皆云啓母塗山氏所化厯代崇祀見漢武帝紀淮南子云禹通轘轅塗山欲餉聞鼓乃來禹跳石誤中鼓塗山忽至見禹為熊慙而去至嵩山下化為石禹曰歸我子石破北方而生啓此與廣德所祀聖河夫人事相類吕氏春秋又謂啓母乃九尾白狐益妄盧元明輩又以啓母為陽翟夫人按嵩髙記陽翟夫人妊三十月子從背出五歲入山學道為母立祠曰開母祠開即啓也遂訛為塗山云嵩北又有少室姨神廟唐楊炯撰少姨廟記云少姨廟其神為婦人像故老相傳啓母塗山之妹莫詳所始蘇伯吉利祝融之裔也吉利妻王氏名摶頰死為竈神見五經異義摶頰一作摶俠仙傳拾遺司命君生於唐時民間與元環同學年十五六仙去環一作瓌事甚誕酉陽雜俎竈神名壤子又云名隗狀如美女姓張字子郭夫人字卿忌有六女皆名蔡宋玉髙唐神女賦寓言託興以諷襄王非必實事如唐人記后土事以譏武后之類耳集仙録乃謂巫山神女名雲華即王母之女以太上靈寶之文授禹者甚妄而文士乂為神女傳記以實之遍舉天地百神可笑也河伯姓馮名夷見文選李善注太公金匱云河伯姓馮名修然莊子淮南子裴氏新語皆以為馮夷一名水夷又龍魚河圖云河伯姓吕名公子夫人姓馮名夷唐時秦宗撰河侯祠碑云河北姓馮名夷字公子皆荒誕無稽𤾉谷之神名天吳是為水伯北海之神名禺彊一作隅彊一作禺京是為𤣥冥夸娥氏古之有神力者一作夸蛾禹治淮水功不成禹怒召百靈命䕫龍等請命因囚鴻蒙氏彰商氏朝氏盧氏犁婁氏乃獲淮水神名無支祈者彰商一作章商朝一作兜一作郖一作斫黎婁一作犁婁無支祈一作亡支祈善應對形若猿猱青軀白首金目雪牙頸伸百尺力逾九象騰趠倐忽視不可久禹命童律烏木田不能制乃命庚辰制之鎖械淮陰龜山之麓庚辰后稷字風俗通云共工之子修好逺遊死為祖神亦見禮記外傳及荀彧傳注惟路史以祖神為術囂之子名條者且辨修字為非蓋臆决也仙傳云三茅君茅濛𤣥孫也長君名盈字叔申次君名固字季偉小君名衷字思和盈為東嶽上卿司命真君固為定録真君衷為保命真命固一作容衷一作震茅濛字初成師鬼谷先生三輔黃圖又引茅盈內傳云盈乃濛曽孫山海經云炎帝少女名女娃溺死於海化為鳥名精衛女娃一作女媘又云帝女死於姑媱山化為䔄草又云夸父之杖化為鄧林夸父一作舉父又云帝殺欽䲹化為大梟又云女媧之腸化為十神均妄山海經多神怪不偹載載其字異者槐江山神名英招一作英昭崑崙山神名陸吾一作肩吾郭璞注云即莊子所謂肩吾得之以處大山也騩山神名耆童一作老童螺母山神名長乘一作長來一作長采驕山神名􅀢圍一作鼉圉岐山神名涉􅀢一作攝鼉東海渚中神名禺􅝠一作禺號一作禺號南方苗民有神名延一作延維一作委蛇東荒神人名犁􅛗一作黎靈世傳鍾馗唐武德中應舉不捷觸殿階而死後見夢於明皇曰臣終南進士鍾馗願除天下虛耗之孽此事見逸史唐書不載或云北史堯暄字辟邪本名鍾葵馗葵音同見續博物志又按周禮考工記云大圭首終葵注云終葵椎也正韻云葵一作楑楊子巵言即以鍾馗之訛本於此似無確據若以字音相同則左傳殷人七族有終葵氏爾雅釋草篇有蔠葵中馗二草名豈可曲引為證或云鍾馗當作終䕫謂六書本義終有窮極畢死之義古文馗一作馗集韻馗䕫逵㙺通用䕫山鬼名孔叢子所謂土石之怪䕫罔兩是也窮治邪鬼故稱終䕫耳此亦意撰也若然則作鍾馗亦可鍾有收聚之義何必改鍾為終俗繪鍾馗執鬼以衛宅韻府云鍾馗鬼名非也又按孫逖張說文集有謝賜鍾馗畫表則鍾馗之名不始於開元時矣山海經神荼鬱壘二神人主執惡鬼神荼一作神茶鬱壘風俗通作鬱律或又作􅀈􅀈王充云鬱壘㟪􅕲之類陸法言集韻壘音律沈休文云鬱壘者屈律也丹鉛續録云神荼者伸舒也鬱律者苑結也釋氏通鑑唐髙宗乾封中道宣律師在淨業寺一天神至自稱姓王名璠為南方天王復有一天姓羅又一天姓費又有天人姓陸名元暢其說甚妄佛圖澄天竺人姓帛或作白支遁字道林姓閔一行姓張本名遂乃剡國公公謹之孫元素之姪也釋氏有造天地經云寶厯菩薩下生世間號曰伏羲吉祥菩薩下生世間號曰女媧摩訶迦葉號曰老子儒童菩薩號曰孔丘又有清淨法行經云真丹國乃能從化遣迦葉往為老子淨光童子往為孔丘又遣月明儒童往為顔回三弟子者出生其國乃能從化其侮聖無忌如此故唐杜嗣光有吉祥御宇儒童衍教之說而韓愈亦謂佛者云孔子吾師之弟子也意指此耳道藏經又謂莊王癸巳之歲一陰之月老君遣尹真人喜乘月精白象下天竺於淨梵夫人口中託生佛蓋老釋互相凌壓可發一笑老聃疈左脅而生釋迦疈右脅而生與詩人所詠后稷之生不坼不疈者異矣仙傳有僕僕先生紀聞録有異僧號和和二人皆唐人佛本夷教北史名字多取佛語如楊津字羅漢晏昭字菩薩宇文導亦字菩薩宇文護字薩保婁睿字佛仁魏收字佛助蕭思道字釋奴趙善字僧慶魏𤣥字僧智尉遲綱字婆羅王軌小名沙門薛端小名沙陀王晞小名沙彌其他稱僧仲僧紹僧奴佛奴佛保之類不可勝舉宋歐陽修小兒名僧哥有一僧戲修曰公不信佛何有此名修曰人家小兒要易育成故以賤名為小名如羊豕狗馬之類是也聞者服其捷對釋氏稱比丘比丘尼皆冒吾先聖名字釋氏通鑑劉宋時異僧有求那跋陀羅求那跋摩求那姓跋陀羅跋摩俱名唐太宗貞觀時有法師道遜一作道遜𤣥宗時藥王願施藥餌藥王姓韋名古字老師古或作吉踈勒國人也睿宗先天時永嘉真覺大師名𤣥覺一作元覺唐德宗時龎居士謁石頭和尚忘言妙悟居士名藴字道𤣥一作述𤣥有男名耕穫女名靈照名疑卷四
